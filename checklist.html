
<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>L'aventure des Crocs Mignons</title>

<style>
body{margin:0;font-family:system-ui;background:linear-gradient(135deg,#e0f7fa,#e8f5e9)}
header{background:linear-gradient(90deg,#26a69a,#66bb6a);padding:28px;text-align:center;color:white}
h1{margin:0;font-size:40px;font-weight:900}
.container{max-width:1200px;margin:20px auto;padding:0 16px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px}
.card{background:white;border-radius:14px;padding:12px;box-shadow:0 6px 14px rgba(0,0,0,.1);display:flex;flex-direction:column;gap:10px}
.card.tamed{border:2px solid #4caf50}
.top{display:flex;align-items:center;gap:10px}
.icon{width:52px;height:52px;border-radius:12px;background:#f2f4f6;display:flex;align-items:center;justify-content:center;overflow:hidden;border:1px solid rgba(0,0,0,.1)}
.icon img{width:52px;height:52px;object-fit:cover}
.name{font-weight:900;font-size:14px}
.checks{display:flex;gap:10px;margin-top:auto}
label{flex:1;text-align:center;padding:8px;border-radius:10px;border:1px solid rgba(0,0,0,.1);font-size:12px}
</style>
</head>

<body>
<header>
<h1>L'aventure des Crocs Mignons 🦖</h1>
</header>

<div class="container">
<div class="grid" id="grid"></div>
</div>

<script>
const LS_KEY="crocs_mignons_state_v4";

const DINO_TITLES=['Achatina', 'Allosaure', 'Baudroie abyssale', 'Ankylosaure', 'Aranéo', 'Archéoptéryx', 'Archélon', 'Argentavis', 'Armadoggo', 'Arthropleura', 'Aureliax', 'Baryonyx', 'Basilic', 'Basilosaure', 'Beelzebufo', 'Brontosaure', 'Bulbdog', 'Carbonemys', 'Carcharodontosaure', 'Carnotaure', 'Castoroides', 'Chat', 'Cératosaure', 'Chalicothère', 'Cœlacanthe', 'Compy', 'Cosmo', 'Cryolophosaure', 'Daeodon', 'Deinonychus', 'Deinosuchus', 'Deinotherium', 'Titan du Désert', 'Dilophosaure', 'Dimétrodon', 'Dimorphodon', 'Diplocaulus', 'Diplodocus', 'Ours Sinistre', 'Loup Sinistre', 'Dodo', 'Doedicurus', 'Drakeling Été', 'Drakeling Hiver', 'Drakeling Printemps', 'Drakeling Automne', 'Dreadnoughtus', 'Dreadmare', 'Bousier', 'Dunkleosteus', 'Elderclaw', 'Electrophorus', 'Equus', 'Fasolasuchus', 'Lumicorne (Featherlight)', 'Titan des Forêts', 'Gacha', 'Gallimimus', 'Gasbag', 'Abeille Géante', 'Bison', 'Gigadesmodus', 'Giganotosaure', 'Giganotosaure TEK', 'Gigantopithèque', 'Gigantoraptor', 'Gloon', 'Griffon', 'Helicoprion', 'Hesperornis', 'Hyénodon', 'Titan de Glace', 'Ichthyornis', 'Ichthyosaure', 'Iguanodon', 'Jerboa', 'Kairuku', 'Kaprosuchus', 'Karkinos', 'Kentrosaure', 'Lymantria', 'Lystrosaure', 'Maeguana', 'Malwyn', 'Mammouth', 'Managarmr', 'Manta', 'Mantis', 'Megalania', 'Mégalocéros', 'Mégalodon', 'Mégalosaure', 'Megaraptor', 'Mégathérium', 'Mésopithèque', 'Microraptor', 'Morellatops', 'Mosasaure', 'Moschops', 'Oasisaure', 'Onyc', 'Ossidon', 'Loutre', 'Oviraptor', 'Ovis', 'Pachycéphalosaure (Pachy)', 'Pachyrhinosaure', 'Paraceratherium', 'Parasaure', 'Parasaure TEK', 'Pegomastax', 'Pelagornis', 'Phiomia', 'Phénix', 'Piranha', 'Plésiosaure', 'Procoptodon', 'Ptéranodon', 'Pulmonoscorpius', 'Purlovia', 'Pyromane', 'Quetzal', 'Raptor', 'Raptor TEK', 'Ravageur', 'Faucheur (Reaper)', 'Rex', 'Rex TEK', 'Rhyniognatha', 'Drake des Roches', 'Golem de Pierre', 'Rat des Profondeurs', 'Smilodon (Sabertooth)', 'Saumon Sabertooth', 'Sarcosuchus', 'Shastasaurus', 'Shinehorn', 'Chouette des Neiges', 'Solwyn', 'Spinosaure', 'Stégosaure', 'Stégosaure TEK', 'Tapejara', 'Oiseau-Terreur', 'Thérizinosaure', 'Lézard Épineux', 'Thrall', 'Thylacoleo', 'Titanoboa', 'Titanomyrma', 'Titanosaure', 'Tricératops', 'Troodon', 'Tusoteuthis', 'Licorne', 'Veilwyn', 'Vélonasaure', 'Vautour', 'Rhinocéros Laineux', 'Wyverne de Feu', 'Wyverne de Poison', 'Wyverne de Glace', 'Wyverne de Foudre', 'Wyverne Runique', 'Wyverne Saphir', 'Wyverne Venin', 'Xiphactinus', 'Yi Ling', 'Yutyrannus'];

DINO_TITLES.sort((a,b)=>a.localeCompare(b,'fr'));
let state=JSON.parse(localStorage.getItem(LS_KEY)||"{}");
function save(){localStorage.setItem(LS_KEY,JSON.stringify(state))}
function isTamed(t){return state[t]&&(state[t].m||state[t].f)}
function toggle(t,s,v){state[t]=state[t]||{m:false,f:false};state[t][s]=v;save();render();if(window.__saveToFirebase)window.__saveToFirebase()}

// --- CORRECTION ICONES UNIQUEMENT POUR CEUX QUI BUGGENT ---
const ICON_FIX={
"Archéoptéryx":"Archaeopteryx",
"Archélon":"Archelon",
"Chat":"Cat",
"Carcharodontosaure":"Carcharodontosaurus",
"Cœlacanthe":"Coelacanth",
"Lumicorne (Featherlight)":"Featherlight",
"Parasaure TEK":"Parasaur_Tek",
"Raptor TEK":"Raptor_Tek",
"Rex TEK":"Rex_Tek",
"Stégosaure TEK":"Stegosaurus_Tek",
"Drake des Roches":"Rock_Drake",
"Golem de Pierre":"Rock_Elemental",
"Rat des Profondeurs":"Roll_Rat",
"Chouette des Neiges":"Snow_Owl",
"Rhinocéros Laineux":"Woolly_Rhino",
"Wyverne Runique":"Voidwyrm",
"Wyverne Saphir":"Crystal_Wyvern_Heir",
"Wyverne Venin":"Crystal_Wyvern"
};

function iconUrl(t){
  const base=ICON_FIX[t]||t;
  const clean=base.replace(/\s*\(.*?\)\s*/g,"").trim();
  const file=clean.replace(/\s+/g,"_");
  return "https://ark.fandom.com/wiki/Special:FilePath/"+file+".png";
}

function card(t){
  const d=document.createElement("div");
  d.className="card"+(isTamed(t)?" tamed":"");
  const top=document.createElement("div");top.className="top";
  const icon=document.createElement("div");icon.className="icon";
  const img=document.createElement("img");
  img.src=iconUrl(t);
  img.onerror=()=>{icon.textContent="🦖"};
  icon.appendChild(img);
  const name=document.createElement("div");name.className="name";name.textContent=t;
  top.appendChild(icon);top.appendChild(name);
  const checks=document.createElement("div");checks.className="checks";
  ["m","f"].forEach(s=>{
    const l=document.createElement("label");
    const i=document.createElement("input");
    i.type="checkbox";
    i.checked=!!(state[t]&&state[t][s]);
    i.onchange=e=>toggle(t,s,e.target.checked);
    l.appendChild(i);
    l.appendChild(document.createTextNode(s==="m"?" Mâle":" Femelle"));
    checks.appendChild(l);
  });
  d.appendChild(top);d.appendChild(checks);
  return d;
}

function render(){
  const grid=document.getElementById("grid");
  grid.innerHTML="";
  DINO_TITLES.forEach(t=>grid.appendChild(card(t)));
}

render();
</script>

</body>
</html>
