<script>
(function(){
  const REPRO_STAT_ORDER = [
    ["health","Vie"],
    ["stamina","Énergie"],
    ["weight","Poids"],
    ["melee","Att"],
    ["food","Nourriture"],
    ["oxygen","Oxygène"]
  ];
  let __reproLabInit = false;
  let __reproLabBusy = false;
  let __reproLastPreview = null;
  let __reproFrameCandidates = [];
  let __reproSelectedFrameId = null;

  function reproPoolRoot(create=false){
    if (!state || typeof state !== "object" || Array.isArray(state)) state = {};
    if (!Array.isArray(state.__reproPool)) {
      if (!create) return [];
      state.__reproPool = [];
    }
    return state.__reproPool;
  }

  function saveReproPool(){
    try { saveState(); } catch(_e) {}
    try { if (typeof window.__saveToFirebase === "function") window.__saveToFirebase(); } catch(_e) {}
  }

  function reproSetStatus(msg){
    const el = document.getElementById("reproLabStatus");
    if (el) el.textContent = msg;
  }

  function reproFmtSex(sex){ return sex === "m" ? "Mâle" : (sex === "f" ? "Femelle" : "—"); }
  function reproStatVal(obj, k){
    const n = Number(obj && obj[k]);
    return Number.isFinite(n) ? n : null;
  }
  function reproStatSignature(stats){
    const src = stats || {};
    return REPRO_STAT_ORDER.map(([k]) => `${k}:${Number.isFinite(Number(src[k])) ? Math.round(Number(src[k])) : "-"}`).join("|");
  }
  function reproStatsText(stats){
    const src = stats || {};
    return REPRO_STAT_ORDER
      .map(([k,label]) => {
        const v = reproStatVal(src, k);
        return v === null ? null : `${label} ${v}`;
      })
      .filter(Boolean)
      .join(" · ");
  }
  function reproTrackedKeys(stats){
    return REPRO_STAT_ORDER.map(([k])=>k).filter(k => Number.isFinite(Number(stats && stats[k])));
  }
  function reproBestStatsSource(parsed){
    const wild = parsed?.stats?.wild || {};
    const tamed = parsed?.stats?.tamed || {};
    return Object.keys(wild).length ? wild : tamed;
  }
  function reproCanonEntryFromParsed(parsed, meta={}){
    const stats = reproBestStatsSource(parsed);
    const tracked = reproTrackedKeys(stats);
    if (!parsed?.dinoTitle || !parsed?.sex || tracked.length < 4) return null;
    return {
      id: `rp_${Date.now()}_${Math.random().toString(36).slice(2,8)}`,
      ts: Date.now(),
      dinoTitle: parsed.dinoTitle,
      sex: parsed.sex,
      stats: Object.fromEntries(REPRO_STAT_ORDER.map(([k]) => {
        const v = reproStatVal(stats, k);
        return [k, v === null ? undefined : v];
      }).filter(([,v]) => v !== undefined)),
      signature: reproStatSignature(stats),
      sourceLabel: meta.sourceLabel || "scan",
      sourceType: meta.sourceType || "image",
      frameSec: Number.isFinite(Number(meta.frameSec)) ? Number(meta.frameSec) : null,
      ocrDualOk: parsed?.__ocrCompare?.identical === true ? true : (parsed?.__ocrCompare ? false : null),
      seen: 1,
      firstSeen: Date.now(),
      lastSeen: Date.now(),
      note: meta.note || ""
    };
  }

  function reproAddEntry(entry){
    if (!entry) return { added:false, reason:"invalid" };
    const pool = reproPoolRoot(true);
    const key = `${entry.dinoTitle}__${entry.sex}__${entry.signature}`;
    const dup = pool.find(x => `${x.dinoTitle}__${x.sex}__${x.signature}` === key);
    if (dup) {
      dup.seen = Number(dup.seen || 1) + 1;
      dup.lastSeen = Date.now();
      if (entry.sourceLabel) dup.sourceLabel = entry.sourceLabel;
      if (entry.sourceType) dup.sourceType = entry.sourceType;
      if (Number.isFinite(entry.frameSec)) dup.frameSec = entry.frameSec;
      if (typeof entry.ocrDualOk === "boolean") dup.ocrDualOk = entry.ocrDualOk;
      saveReproPool();
      return { added:false, duplicate:true, entry:dup };
    }
    pool.push(entry);
    saveReproPool();
    return { added:true, entry };
  }

  function reproRemoveEntry(id){
    const pool = reproPoolRoot(true);
    const idx = pool.findIndex(x => x && x.id === id);
    if (idx < 0) return false;
    pool.splice(idx, 1);
    saveReproPool();
    reproRenderAll();
    return true;
  }

  function reproClearPool(){
    state.__reproPool = [];
    saveReproPool();
    reproRenderAll();
  }

  function reproEscape(s){ return (typeof escapeHtml === "function") ? escapeHtml(s) : String(s); }
  function reproFmtDate(ts){
    try {
      const d = new Date(Number(ts)||0);
      return d.toLocaleString("fr-FR");
    } catch(_e) { return "—"; }
  }
  function reproFmtTimeSec(s){
    if (!Number.isFinite(Number(s))) return "";
    const n = Number(s);
    const m = Math.floor(n / 60), sec = Math.floor(n % 60);
    return `${m}:${String(sec).padStart(2,'0')}`;
  }

  function reproBuildPairAnalysis(group){
    const keys = REPRO_STAT_ORDER.map(([k])=>k).filter(k =>
      group.entries.some(e => Number.isFinite(reproStatVal(e.stats, k)))
    );
    const best = {};
    for (const k of keys) {
      const vals = group.entries.map(e => reproStatVal(e.stats, k)).filter(v => v !== null);
      if (vals.length) best[k] = Math.max(...vals);
    }
    const males = group.entries.filter(e => e.sex === "m");
    const females = group.entries.filter(e => e.sex === "f");
    const labelFor = (entry, idx, arr) => `${entry.sex === "m" ? "M" : "F"}${idx+1}`;

    males.forEach((e,i)=> e.__lbl = labelFor(e,i,males));
    females.forEach((e,i)=> e.__lbl = labelFor(e,i,females));

    function keyMaxSet(entry){
      return new Set(keys.filter(k => {
        const v = reproStatVal(entry.stats, k);
        return v !== null && Number.isFinite(best[k]) && v === best[k];
      }));
    }

    const entriesWithSets = group.entries.map(e => ({ ...e, maxSet: keyMaxSet(e) }));
    const males2 = entriesWithSets.filter(e => e.sex === "m");
    const females2 = entriesWithSets.filter(e => e.sex === "f");

    let perfectPair = null;
    for (const m of males2) {
      for (const f of females2) {
        const allMax = keys.every(k => m.maxSet.has(k) && f.maxSet.has(k));
        const sameSig = m.signature === f.signature;
        if (allMax && sameSig) { perfectPair = { m, f }; break; }
      }
      if (perfectPair) break;
    }

    const pairScores = [];
    for (const m of males2) {
      for (const f of females2) {
        const coverage = keys.filter(k => m.maxSet.has(k) || f.maxSet.has(k));
        const both = keys.filter(k => m.maxSet.has(k) && f.maxSet.has(k));
        const missing = keys.filter(k => !coverage.includes(k));
        const equalVals = keys.filter(k => {
          const mv = reproStatVal(m.stats,k), fv = reproStatVal(f.stats,k);
          return mv !== null && fv !== null && mv === fv;
        });
        const compOnlyM = coverage.filter(k => m.maxSet.has(k) && !f.maxSet.has(k));
        const compOnlyF = coverage.filter(k => f.maxSet.has(k) && !m.maxSet.has(k));
        const score = (coverage.length * 100) + (both.length * 12) + (equalVals.length * 2) - (missing.length * 20);
        pairScores.push({ m, f, coverage, both, missing, equalVals, compOnlyM, compOnlyF, score });
      }
    }
    pairScores.sort((a,b)=> b.score - a.score);

    const onePerfect = entriesWithSets.find(e => keys.length && keys.every(k => e.maxSet.has(k))) || null;

    return { keys, best, males:males2, females:females2, perfectPair, pairScores, onePerfect, entries:entriesWithSets };
  }

  function reproRenderAnalysis(){
    const wrap = document.getElementById("reproAnalysis");
    if (!wrap) return;
    const pool = [...reproPoolRoot(false)];
    if (!pool.length) {
      wrap.innerHTML = `<div class="repro-empty">L'analyse apparaîtra ici dès que tu auras des scans.</div>`;
      return;
    }
    const groups = new Map();
    for (const e of pool) {
      if (!e?.dinoTitle) continue;
      if (!groups.has(e.dinoTitle)) groups.set(e.dinoTitle, []);
      groups.get(e.dinoTitle).push(e);
    }
    const sorted = [...groups.entries()].sort((a,b)=> a[0].localeCompare(b[0],'fr',{sensitivity:'base'}));

    wrap.innerHTML = sorted.map(([title, entries]) => {
      const ana = reproBuildPairAnalysis({ title, entries });
      const bestLine = ana.keys.map(k => `${reproStatLabel(k)} ${ana.best[k]}`).join(" · ");
      const countsLine = `${ana.males.length} mâle(s) · ${ana.females.length} femelle(s)`;
      let recommendationHtml = "";
      if (!ana.males.length || !ana.females.length) {
        recommendationHtml = `<div class="line">⚠️ Il manque ${!ana.males.length ? "un mâle" : "une femelle"} pour calculer un couple.</div>`;
      } else if (ana.perfectPair) {
        recommendationHtml = `
          <div class="line"><span class="pill ok">Parfait déjà obtenu</span>Tu as déjà un couple parfait miroir (mêmes stats max) : <b>${reproEscape(ana.perfectPair.m.__lbl)}</b> × <b>${reproEscape(ana.perfectPair.f.__lbl)}</b>.</div>
          <div class="line">➡️ Action: garde ce couple pour sortir des bébés “base” identiques / sécuriser ta lignée.</div>
        `;
      } else if (ana.pairScores.length) {
        const p = ana.pairScores[0];
        const coverPct = ana.keys.length ? Math.round((p.coverage.length / ana.keys.length) * 100) : 0;
        const mCarry = p.compOnlyM.map(reproStatLabel).join(", ");
        const fCarry = p.compOnlyF.map(reproStatLabel).join(", ");
        recommendationHtml = `
          <div class="line"><span class="pill warn">Couple conseillé</span><b>${reproEscape(p.m.__lbl)}</b> × <b>${reproEscape(p.f.__lbl)}</b> · couverture des stats max: <b>${p.coverage.length}/${ana.keys.length}</b> (${coverPct}%).</div>
          <div class="line">${mCarry ? `♂ apporte: <b>${reproEscape(mCarry)}</b>. ` : ""}${fCarry ? `♀ apporte: <b>${reproEscape(fCarry)}</b>.` : ""}</div>
          <div class="line">${p.missing.length ? `🎯 Stats max encore non couvertes par ce couple: <b>${reproEscape(p.missing.map(reproStatLabel).join(", "))}</b>.` : `✅ Ce couple couvre déjà toutes les stats max observées (consolidation à faire).`}</div>
          <div class="line">Astuce: garde les bébés qui combinent un maximum de stats listées ci-dessus, puis rescanne-les ici pour recalcul automatique.</div>
        `;
      }

      const mini = ana.entries
        .sort((a,b)=> {
          if (a.sex !== b.sex) return a.sex.localeCompare(b.sex);
          const sa = [...a.maxSet].length, sb = [...b.maxSet].length;
          if (sb !== sa) return sb - sa;
          return (a.__lbl||"").localeCompare(b.__lbl||"");
        })
        .map(e => {
          const maxKeys = [...e.maxSet].map(reproStatLabel);
          return `<div class="mini-item"><b>${reproEscape(e.__lbl)}</b> (${e.sex === "m" ? "♂" : "♀"}) · max: ${maxKeys.length ? reproEscape(maxKeys.join(", ")) : "—"} · <span class="mono">${reproEscape(reproStatsText(e.stats))}</span></div>`;
        })
        .join("");

      return `
        <div class="repro-card">
          <div class="hd">
            <div>
              <div class="title">${reproEscape(title)}</div>
              <div class="counts">${reproEscape(countsLine)}</div>
            </div>
            <div>
              ${ana.perfectPair ? `<span class="pill ok">Prêt</span>` : `<span class="pill warn">À optimiser</span>`}
            </div>
          </div>
          <div class="line">🏆 Meilleures stats observées: <span class="mono">${reproEscape(bestLine || "—")}</span></div>
          ${ana.onePerfect ? `<div class="line">👶 Un individu possède déjà toutes les meilleures stats observées: <b>${reproEscape(ana.onePerfect.__lbl)}</b> (${ana.onePerfect.sex === "m" ? "♂" : "♀"}). Il faut maintenant l'autre sexe identique / équivalent pour sécuriser la lignée.</div>` : ``}
          ${recommendationHtml}
          <div class="mini-list">${mini}</div>
        </div>
      `;
    }).join("");
  }

  async function reproOcrSourceToParsed(sourceForOcr, imgLikeForFallback, opts={}){
    const dual = opts.dualOcr !== false;
    await ensureTesseractLoaded();

    const resultA = await window.Tesseract.recognize(sourceForOcr, "eng", {
      logger: (m) => {
        if (!opts.onProgress || !m?.status) return;
        const pct = Number.isFinite(m.progress) ? ` ${Math.round(m.progress * 100)}%` : "";
        opts.onProgress(`OCR A: ${m.status}${pct}`);
      }
    });
    const textA = resultA?.data?.text || "";
    const parsedA = parseArkOcrText(textA);
    let parsed = parsedA;

    if (dual && imgLikeForFallback) {
      try {
        opts.onProgress && opts.onProgress("OCR B: contrôle croisé…");
        const altCanvas = buildSecondTextOcrCanvas(imgLikeForFallback);
        const resultB = await window.Tesseract.recognize(altCanvas, "eng");
        const textB = resultB?.data?.text || "";
        const parsedB = parseArkOcrText(textB);
        parsed.__ocrCompare = compareDualOcrParsed(parsedA, parsedB);
      } catch (_e) {
        // ignore
      }
    }

    try {
      if (imgLikeForFallback) {
        const extra = await extractBreederStatsFromImage(imgLikeForFallback);
        if (extra) {
          parsed.stats = parsed.stats || { wild:{}, tamed:{}, rawPairs:[] };
          parsed.stats.wild = parsed.stats.wild || {};
          Object.assign(parsed.stats.wild, extra);
          parsed.stats.rawPairs = Array.isArray(parsed.stats.rawPairs) ? parsed.stats.rawPairs : [];
          const seen = new Set(parsed.stats.rawPairs.map(p => Array.isArray(p) ? `${Number(p[0])}|${Number(p[1])}` : ""));
          for (const v of Object.values(extra)) {
            const k = `${Number(v)}|0`;
            if (Number.isFinite(Number(v)) && !seen.has(k)) {
              parsed.stats.rawPairs.push([Number(v),0]);
              seen.add(k);
            }
          }
        }
      }
    } catch(_e) {}

    return { parsed, textA };
  }

  function reproFrameHash(canvas){
    try {
      const sw = 16, sh = 9;
      const tmp = document.createElement('canvas');
      tmp.width = sw; tmp.height = sh;
      tmp.getContext('2d').drawImage(canvas, 0, 0, sw, sh);
      const d = tmp.getContext('2d', { willReadFrequently:true }).getImageData(0,0,sw,sh).data;
      let out = "";
      for (let i=0;i<d.length;i+=4){
        const y = Math.round(0.2126*d[i]+0.7152*d[i+1]+0.0722*d[i+2]);
        out += String.fromCharCode(65 + Math.floor(y/16));
      }
      return out;
    } catch(_e) { return ""; }
  }

  function reproSeekVideo(video, t){
    return new Promise((resolve, reject) => {
      let done = false;
      const clean = () => {
        video.removeEventListener('seeked', onSeeked);
        video.removeEventListener('error', onError);
      };
      const onSeeked = () => {
        if (done) return; done = true; clean(); resolve();
      };
      const onError = (e) => {
        if (done) return; done = true; clean(); reject(e || new Error("Erreur vidéo"));
      };
      video.addEventListener('seeked', onSeeked, { once:true });
      video.addEventListener('error', onError, { once:true });
      try {
        video.currentTime = Math.max(0, Math.min(Number(video.duration || 0) || 0, t));
      } catch(e){ clean(); reject(e); }
    });
  }

  async function reproProcessVideoFile(file, fileIndex, totalFiles){
    const name = file?.name || `video-${fileIndex+1}.mp4`;
    const intervalInput = document.getElementById('reproMp4Interval');
    const maxFramesInput = document.getElementById('reproMp4MaxFrames');
    const widthInput = document.getElementById('reproMp4MaxWidth');
    let intervalSec = Math.max(0.4, Number(intervalInput?.value || 1) || 1);
    let maxFrames = Math.max(3, Math.min(300, Math.round(Number(maxFramesInput?.value || 40) || 40)));
    let maxWidth = Math.max(640, Math.min(1920, Math.round(Number(widthInput?.value || 1280) || 1280)));

    const url = URL.createObjectURL(file);
    const video = document.createElement('video');
    video.muted = true; video.playsInline = true; video.preload = 'metadata'; video.src = url;
    await new Promise((resolve, reject) => {
      const onLoaded = () => { cleanup(); resolve(); };
      const onErr = (e) => { cleanup(); reject(new Error("Impossible de lire le MP4")); };
      const cleanup = () => {
        video.removeEventListener('loadedmetadata', onLoaded);
        video.removeEventListener('error', onErr);
      };
      video.addEventListener('loadedmetadata', onLoaded);
      video.addEventListener('error', onErr);
    });

    const duration = Number(video.duration || 0);
    if (!Number.isFinite(duration) || duration <= 0) throw new Error("Durée MP4 invalide");

    let times = [];
    for (let t = 0; t <= duration + 0.0001; t += intervalSec) times.push(Math.min(duration, Number(t.toFixed(3))));
    if (times.length > maxFrames) {
      const reduced = [];
      for (let i=0;i<maxFrames;i++) {
        const t = (i === maxFrames - 1) ? duration : (duration * i / Math.max(1, maxFrames - 1));
        reduced.push(Number(t.toFixed(3)));
      }
      times = reduced;
    }

    const vw = video.videoWidth || 1280;
    const vh = video.videoHeight || 720;
    const scale = Math.min(1, maxWidth / Math.max(1, vw));
    const cw = Math.max(1, Math.round(vw * scale));
    const ch = Math.max(1, Math.round(vh * scale));
    const canvas = document.createElement('canvas');
    canvas.width = cw; canvas.height = ch;
    const ctx = canvas.getContext('2d', { willReadFrequently:true });

    let added = 0, dupEntry = 0, skipped = 0, ocrErrors = 0;
    let lastHash = "";

    for (let i = 0; i < times.length; i++) {
      const t = times[i];
      reproSetStatus(`🎬 ${fileIndex+1}/${totalFiles} · ${name} · frame ${i+1}/${times.length} (${reproFmtTimeSec(t)})`);
      await reproSeekVideo(video, t);
      ctx.drawImage(video, 0, 0, cw, ch);

      const h = reproFrameHash(canvas);
      if (h && h === lastHash) { skipped++; continue; }
      lastHash = h;

      const preview = canvas.toDataURL('image/jpeg', 0.78);
      __reproLastPreview = { src: preview, txt: `${name} · ${reproFmtTimeSec(t)}` };
      reproRenderPreview();

      try {
        const { parsed } = await reproOcrSourceToParsed(canvas, canvas, {
          dualOcr: false,
          onProgress: (s) => reproSetStatus(`🎬 ${fileIndex+1}/${totalFiles} · ${name} · ${reproFmtTimeSec(t)} · ${s}`)
        });
        const entry = reproCanonEntryFromParsed(parsed, { sourceLabel: name, sourceType: "video", frameSec: t });
        if (!entry) { skipped++; continue; }
        const res = reproAddEntry(entry);
        if (res.duplicate) dupEntry++;
        else added++;
      } catch (e) {
        console.error(e);
        ocrErrors++;
      }
      reproRenderAll();
    }

    URL.revokeObjectURL(url);
    return { added, dupEntry, skipped, ocrErrors, frameCount: times.length, duration };
  }

  function reproResetManualStatFields(keepMeta=true){

  function reproBindHybridUi(){
    const clearFramesBtn = document.getElementById('reproClearFramesBtn');
    const addBtn = document.getElementById('reproManualAddBtn');
    const resetBtn = document.getElementById('reproManualResetBtn');
    const skipBtn = document.getElementById('reproManualSkipBtn');
    const nextBtn = document.getElementById('reproManualNextBtn');
    const useOcrBtn = document.getElementById('reproManualTryOcrBtn');

    clearFramesBtn?.addEventListener('click', () => {
      if (!__reproFrameCandidates.length) return;
      if (!confirm('Vider les frames MP4 extraites (ça ne supprime pas la bibliothèque repro) ?')) return;
      reproClearFrames();
      reproSetStatus('Frames MP4 vidées 🧹');
    });

    resetBtn?.addEventListener('click', () => {
      reproResetManualStatFields(false);
      reproSetStatus('Formulaire manuel réinitialisé.');
    });

    skipBtn?.addEventListener('click', () => {
      const vals = reproManualFormValues();
      const f = reproGetFrameCandidate(vals.frameId || __reproSelectedFrameId);
      if (!f) { reproSetStatus('Sélectionne une frame à ignorer.'); return; }
      f.status = 'skipped';
      f.note = 'ignorée';
      reproRenderFrameCandidates();
      reproSetStatus(`Frame ${reproFmtTimeSec(f.frameSec)} ignorée.`);
      const next = __reproFrameCandidates.find(x => x.status === 'new');
      if (next) reproSelectFrame(next.id);
    });

    nextBtn?.addEventListener('click', () => {
      if (!__reproFrameCandidates.length) return;
      const idx = __reproFrameCandidates.findIndex(f => f.id === __reproSelectedFrameId);
      const list = __reproFrameCandidates;
      for (let i=1;i<=list.length;i++){
        const cand = list[(Math.max(idx, -1) + i) % list.length];
        if (cand && cand.status === 'new') { reproSelectFrame(cand.id); return; }
      }
      if (list[(idx+1)%list.length]) reproSelectFrame(list[(idx+1)%list.length].id);
    });

    addBtn?.addEventListener('click', () => {
      const vals = reproManualFormValues();
      const mk = reproManualToEntry(vals);
      if (!mk.ok) { reproSetStatus(`Validation manuelle ❌ · ${mk.msg}`); return; }
      const res = reproAddEntry(mk.entry);
      const f = reproGetFrameCandidate(vals.frameId || __reproSelectedFrameId);
      if (f) {
        f.status = res.duplicate ? 'duplicate' : 'saved';
        f.note = res.duplicate ? 'doublon' : 'ajouté';
      }
      reproRenderAll();
      reproRenderFrameCandidates();
      reproSetStatus(res.duplicate ? 'Entrée manuelle reconnue comme doublon ✅' : 'Entrée manuelle ajoutée ✅');
      reproResetManualStatFields(true);
      const next = __reproFrameCandidates.find(x => x.status === 'new');
      if (next) reproSelectFrame(next.id);
    });

    useOcrBtn?.addEventListener('click', async () => {
      const vals = reproManualFormValues();
      const f = reproGetFrameCandidate(vals.frameId || __reproSelectedFrameId);
      if (!f || !f.thumb) { reproSetStatus('Sélectionne une frame avant OCR assisté.'); return; }
      try {
        reproSetStatus(`OCR assisté sur frame ${reproFmtTimeSec(f.frameSec)}…`);
        const img = await reproDataUrlToImage(f.thumb);
        const { parsed } = await reproOcrSourceToParsed(img, img, { dualOcr:false, onProgress:(m)=>reproSetStatus(`OCR assisté · ${m}`) });
        if (parsed?.dinoTitle) { const el = document.getElementById('reproManualDino'); if (el && !el.value) el.value = parsed.dinoTitle; }
        if (parsed?.sex) { const el = document.getElementById('reproManualSex'); if (el) el.value = parsed.sex; }
        const stats = reproBestStatsSource(parsed);
        for (const [k] of REPRO_STAT_ORDER){
          const v = reproStatVal(stats, k);
          if (v === null) continue;
          const el = document.getElementById(`reproManual_${k}`);
          if (el && !String(el.value||'').trim()) el.value = String(v);
        }
        reproSetStatus('OCR assisté terminé ✍️ · Vérifie puis clique Ajouter');
      } catch(e){
        console.error(e);
        reproSetStatus(`OCR assisté impossible ❌ : ${e?.message || e}`);
      }
    });
  }

  async function reproExtractVideoFramesForReview(file, fileIndex, totalFiles){
    const name = file?.name || `video-${fileIndex+1}.mp4`;
    const intervalInput = document.getElementById('reproMp4Interval');
    const maxFramesInput = document.getElementById('reproMp4MaxFrames');
    const widthInput = document.getElementById('reproMp4MaxWidth');
    let intervalSec = Math.max(0.4, Number(intervalInput?.value || 1) || 1);
    let maxFrames = Math.max(3, Math.min(300, Math.round(Number(maxFramesInput?.value || 40) || 40)));
    let maxWidth = Math.max(640, Math.min(1920, Math.round(Number(widthInput?.value || 1280) || 1280)));

    const url = URL.createObjectURL(file);
    const video = document.createElement('video');
    video.muted = true; video.playsInline = true; video.preload = 'metadata'; video.src = url;
    await new Promise((resolve, reject) => {
      const onLoaded = () => { cleanup(); resolve(); };
      const onErr = () => { cleanup(); reject(new Error('Impossible de lire le MP4')); };
      const cleanup = () => {
        video.removeEventListener('loadedmetadata', onLoaded);
        video.removeEventListener('error', onErr);
      };
      video.addEventListener('loadedmetadata', onLoaded);
      video.addEventListener('error', onErr);
    });

    const duration = Number(video.duration || 0);
    if (!Number.isFinite(duration) || duration <= 0) throw new Error('Durée MP4 invalide');

    let times = [];
    for (let t = 0; t <= duration + 0.0001; t += intervalSec) times.push(Math.min(duration, Number(t.toFixed(3))));
    if (times.length > maxFrames) {
      const reduced = [];
      for (let i=0;i<maxFrames;i++) {
        const t = (i === maxFrames - 1) ? duration : (duration * i / Math.max(1, maxFrames - 1));
        reduced.push(Number(t.toFixed(3)));
      }
      times = reduced;
    }

    const vw = video.videoWidth || 1280;
    const vh = video.videoHeight || 720;
    const scale = Math.min(1, maxWidth / Math.max(1, vw));
    const cw = Math.max(1, Math.round(vw * scale));
    const ch = Math.max(1, Math.round(vh * scale));
    const canvas = document.createElement('canvas');
    canvas.width = cw; canvas.height = ch;
    const ctx = canvas.getContext('2d', { willReadFrequently:true });

    const out = [];
    let lastHash = '';
    for (let i=0;i<times.length;i++){
      const t = times[i];
      reproSetStatus(`🎬 Mode guidé · ${fileIndex+1}/${totalFiles} · ${name} · frame ${i+1}/${times.length} (${reproFmtTimeSec(t)})`);
      await reproSeekVideo(video, t);
      ctx.drawImage(video, 0, 0, cw, ch);
      const h = reproFrameHash(canvas);
      if (h && h === lastHash) continue;
      lastHash = h;
      const thumb = canvas.toDataURL('image/jpeg', 0.78);
      out.push(reproNewFrameCandidate({ sourceLabel:name, sourceType:'video', frameSec:t, thumb, frameHash:h, width:cw, height:ch }));
      __reproLastPreview = { src: thumb, txt: `${name} · ${reproFmtTimeSec(t)} (mode guidé)` };
      reproRenderPreview();
      reproRenderFramesMeta(`extraction ${i+1}/${times.length}`);
    }

    URL.revokeObjectURL(url);
    return { frames: out, duration, sampled: times.length };
  }

  function reproRenderPreview(){
    const wrap = document.getElementById("reproLabPreview");
    if (!wrap) return;
    if (!__reproLastPreview) {
      wrap.style.display = "none";
      return;
    }
    wrap.style.display = "";
    const img = wrap.querySelector("img");
    const txt = wrap.querySelector(".txt");
    if (img) img.src = __reproLastPreview.src || "";
    if (txt) txt.textContent = __reproLastPreview.txt || "";
  }

  async function reproProcessFiles(files){
    if (!files || !files.length) return;
    if (__reproLabBusy) { reproSetStatus("Analyse déjà en cours…"); return; }
    __reproLabBusy = true;
    const summary = { imgOk:0, imgDup:0, imgFail:0, vids:0 };
    try {
      const arr = [...files];
      for (let i = 0; i < arr.length; i++) {
        const f = arr[i];
        const type = (f.type || "").toLowerCase();
        if (type.startsWith("image/")) {
          try {
            const res = await reproProcessImageFile(f, i, arr.length);
            if (res.ok) {
              if (res.duplicate) summary.imgDup++;
              else summary.imgOk++;
            } else {
              summary.imgFail++;
            }
          } catch(e) {
            console.error(e);
            summary.imgFail++;
          }
          reproRenderAll();
          continue;
        }
        if (type.startsWith("video/") || /\.(mp4|webm|mov)$/i.test(f.name || "")) {
          try {
            summary.vids++;
            const guided = document.getElementById('reproMp4GuidedMode')?.checked !== false;
            if (guided) {
              const r = await reproExtractVideoFramesForReview(f, i, arr.length);
              __reproFrameCandidates.push(...r.frames);
              // tri + sélection automatique première frame nouvelle
              __reproFrameCandidates.sort((a,b)=> (a.sourceLabel||'').localeCompare((b.sourceLabel||''), 'fr', {sensitivity:'base'}) || (a.frameSec||0)-(b.frameSec||0));
              reproRenderFrameCandidates();
              if (!__reproSelectedFrameId && __reproFrameCandidates.length) reproSelectFrame(__reproFrameCandidates[0].id);
              reproSetStatus(`🎬 ${f.name} extrait en mode guidé ✅ · ${r.frames.length} frame(s) candidate(s)`);
            } else {
              const r = await reproProcessVideoFile(f, i, arr.length);
              reproSetStatus(`🎬 ${f.name} terminé · +${r.added} unique(s), ${r.dupEntry} doublon(s), ${r.skipped} frame(s) ignorée(s)`);
            }
          } catch(e) {
            console.error(e);
            summary.imgFail++;
            reproSetStatus(`Erreur MP4 (${f.name}) ❌ : ${e?.message || e}`);
          }
          reproRenderAll();
          continue;
        }
        summary.imgFail++;
      }
      reproRenderAll();
      reproSetStatus(`Terminé ✅ · Images +${summary.imgOk} · doublons ${summary.imgDup} · erreurs/ignorés ${summary.imgFail}${summary.vids ? ` · vidéos ${summary.vids}` : ""}`);
    } finally {
      __reproLabBusy = false;
    }
  }

  function reproBindUi(){
    const input = document.getElementById("reproFileInput");
    const pick = document.getElementById("reproPickBtn");
    const recalc = document.getElementById("reproRecalcBtn");
    const clearBtn = document.getElementById("reproClearBtn");
    const dz = document.getElementById("reproLabDrop");

    pick?.addEventListener("click", ()=> input?.click());
    input?.addEventListener("change", async (e)=> {
      const files = [...(e.target.files || [])];
      if (files.length) await reproProcessFiles(files);
      e.target.value = "";
    });
    recalc?.addEventListener("click", ()=> { reproRenderAll(); reproSetStatus("Conseils recalculés ✅"); });
    clearBtn?.addEventListener("click", ()=> {
      if (!confirm("Vider toute la bibliothèque Repro ?")) return;
      reproClearPool();
      reproSetStatus("Bibliothèque vidée 🧹");
    });

    reproBindHybridUi();

    if (dz) {
      ["dragenter","dragover"].forEach(evt => dz.addEventListener(evt, (e)=> {
        e.preventDefault(); e.stopPropagation(); dz.classList.add("dragover");
      }));
      ["dragleave","drop"].forEach(evt => dz.addEventListener(evt, (e)=> {
        e.preventDefault(); e.stopPropagation(); dz.classList.remove("dragover");
      }));
      dz.addEventListener("drop", async (e)=> {
        const files = [...(e.dataTransfer?.files || [])];
        if (!files.length) { reproSetStatus("Aucun fichier détecté."); return; }
        await reproProcessFiles(files);
      });
      dz.addEventListener("paste", async (e)=> {
        const items = [...(e.clipboardData?.items || [])];
        const imgs = items.filter(it => it.type && it.type.startsWith("image/"));
        if (!imgs.length) return;
        e.preventDefault();
        const files = imgs.map((it,idx) => {
          const b = it.getAsFile();
          return b ? new File([b], `capture-paste-${Date.now()}-${idx+1}.png`, { type: b.type || "image/png" }) : null;
        }).filter(Boolean);
        if (files.length) await reproProcessFiles(files);
      });
      dz.addEventListener("click", ()=> input?.click());
      dz.addEventListener("keydown", (e)=> {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); input?.click(); }
      });
    }
  }

  }

  function reproInit(){
    if (__reproLabInit) return;
    __reproLabInit = true;
    reproPatchPageLook();
    reproInsertPanel();
    reproBindUi();
    reproRenderAll();
    reproRenderPreview();
    reproRenderFrameCandidates();
    reproFillManualFormFromFrame(null);
    reproSetStatus("Prêt ✅ · Dépose captures ou MP4 (mode guidé recommandé)");
  }

  window.addEventListener("load", () => {
    setTimeout(reproInit, 0);
  });
})();
