services:
  - type: web
    name: ark-repro-backend
    env: python
    plan: free
    autoDeploy: true
    rootDir: Backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_MODE
        value: production
      - key: MAX_UPLOAD_MB
        value: "250"
      - key: ARK_VISION_PROVIDER
        value: openai
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_API_KEY
        sync: false
      - key: ARK_VISION_BATCH_SIZE
        value: "6"
      - key: ARK_VISION_MAX_CALL_FRAMES
        value: "18"
      - key: ARK_VISION_IMAGE_DETAIL
        value: low
