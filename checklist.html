<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>L'aventure des Crocs Mignons</title>

<style>
  body {
    margin:0;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    background: linear-gradient(135deg, #e0f7fa, #e8f5e9);
    color:#1b1b1b;
  }

  header {
    background: linear-gradient(90deg, #26a69a, #66bb6a);
    padding:28px 16px;
    text-align:center;
    color:white;
    box-shadow: 0 6px 16px rgba(0,0,0,0.18);
  }

  h1 {
    margin:0;
    font-size:44px;
    font-weight:900;
    letter-spacing:1px;
  }

  .container {
    max-width:1200px;
    margin:22px auto 40px;
    padding:0 16px;
  }

  .controls {
    display:flex;
    gap:10px;
    margin: 14px 0 14px;
    flex-wrap:wrap;
  }

  input[type="search"] {
    flex: 1 1 320px;
    padding:11px 12px;
    border-radius:10px;
    border:1px solid rgba(0,0,0,0.18);
    background: rgba(255,255,255,0.9);
    outline:none;
  }

  button {
    padding:11px 14px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#1e8e84;
    color:white;
    font-weight:800;
  }

  button:hover { background:#16766e; }

  .stats {
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
    margin-bottom: 14px;
    font-weight:800;
  }

  .pill {
    background: rgba(255,255,255,0.75);
    border: 1px solid rgba(0,0,0,0.12);
    border-radius: 999px;
    padding: 8px 10px;
    font-size: 12px;
  }

  progress {
    width: 260px;
    height: 14px;
    border-radius: 999px;
    overflow:hidden;
  }

  .grid {
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    gap:14px;
  }

  .card {
    background:white;
    border-radius:14px;
    padding:12px;
    box-shadow:0 6px 14px rgba(0,0,0,0.10);
    display:flex;
    flex-direction:column;
    gap:10px;
    border: 2px solid transparent;
  }

  .card.tamed { border-color: #4caf50; }

  .top { display:flex; align-items:center; gap:10px; }

  .icon {
    width:52px;
    height:52px;
    border-radius:12px;
    background:#f2f4f6;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    font-size:22px;
    border: 1px solid rgba(0,0,0,0.10);
    flex: 0 0 auto;
  }

  .icon img {
    width:52px;
    height:52px;
    object-fit:cover;
    display:block;
  }

  .name { font-weight:900; font-size:14px; line-height:1.2; }

  .checks { display:flex; gap:10px; margin-top:auto; }

  label.chk {
    flex: 1 1 0;
    font-size:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    padding:9px 10px;
    border-radius:12px;
    border:1px solid rgba(0,0,0,0.10);
    background: rgba(245,247,248,0.9);
    user-select:none;
  }

  label.chk input { transform: scale(1.15); }
</style>
</head>

<body>

<header>
  <h1>L'aventure des Crocs Mignons 🦖</h1>
</header>

<div class="container">
  <div class="controls">
    <input id="search" type="search" placeholder="Rechercher un dino..." />
    <button id="reset">Reset</button>
    <button id="export">Export JSON</button>
  </div>

  <div class="stats">
    <span class="pill" id="statsText"></span>
    <progress id="prog" value="0" max="1"></progress>
    <span class="pill" id="shownText"></span>
  </div>

  <div class="grid" id="grid"></div>
</div>

<script>
const LS_KEY = "crocs_mignons_custom_list_v2";
const DINO_TITLES = ["Abeille géante", "Achatina", "Allosaure", "Andrewsarchus", "Ankylosaure", "Aranéo", "Archaeopteryx", "Argentavis", "Arthropleura", "Astrocetus", "Astrodelphis", "Baryonyx", "Basilic", "Basilosaure", "Baudroie abyssale", "Beelzebufo", "Bousier", "Brontosaure", "Bulbdog", "Carbonemys", "Carcharodontosaurus", "Carnotaure", "Castoroides", "Chalicotherium", "Coelacanthe", "Compy", "Daeodon", "Deinonychus", "Desmodus", "Dilophosaure", "Dimétrodon", "Dimorphodon", "Diplocaulus", "Diplodocus", "Dodo", "Doedicurus", "Dragon Rocheux", "Drone de combat", "Dunkleosteus", "Éclaireur", "Electrophorus", "Equus", "Exécuteur", "Faucheur", "Fenrir", "Gacha", "Gallimimus", "Gasbag", "Gecko luisant", "Giganotosaure", "Giganotosaure Tek", "Gigantopithèque", "Golem de pierre", "Griffon", "Hesperornis", "Hyène", "Ichthyornis", "Ichthyosaure", "Iguanodon", "Jerboa", "Kairuku", "Kaprosuchus", "Karkinos", "Kentrosaure", "Lézard épineux", "Loup Sinistre", "Loutre", "Lumicorne", "Lystrosaure", "Maewing", "Maeguana", "Mammouth", "Managarm", "Manta", "Mantis", "Megalania", "Mégalocéros", "Mégalodon", "Mégathérium", "Mek", "Mésopithèque", "Microraptor", "Mosasaure", "Moschops", "Oiseau-Terreur", "Onyc", "Ours Sinistre", "Oviraptor", "Ovis", "Pachycéphalosaure", "Pachyrhinosaure", "Paraceratherium", "Parasaure", "Pegomastax", "Pelagornis", "Phénix", "Phiomia", "Piranha", "Plésiosaure", "Plumineux", "Procoptodon", "Ptéranodon", "Pulmonoscorpius", "Purlovia", "Quetzal", "Raptor", "Raptor tek", "Rat des profondeurs", "Ravageur", "Rhinocéros laineux", "Sarcosuchus", "Saumon", "Smilodon", "Spinosaure", "Stégosaure", "Stégosaure TEK", "T-Rex", "T-Rex TEK", "Tapejara", "Thérizinosaure", "Thylacoleo", "Titan de Glace", "Titan des Forêts", "Titan du Désert", "Titanoboa", "Titanosaure", "Tricératops", "Tricératops TEK", "Troodon", "Tusoteuthis", "Unité de défense", "Vautour", "Vélonasaure", "Wyverne", "Wyverne de Cristal", "Wyverne de Feu", "Wyverne de foudre", "Wyverne de Glace", "Wyverne de poison", "Yutyrannus"];
let state = JSON.parse(localStorage.getItem(LS_KEY) || "{}");

function saveState(){localStorage.setItem(LS_KEY,JSON.stringify(state));}
function iconUrl(t){return "https://ark.fandom.com/wiki/Special:FilePath/"+encodeURIComponent(t.replace(/\s+/g,"_"))+".png";}
function isTamed(t){return state[t]&&(state[t].m||state[t].f);}
function toggle(t,s,v){state[t]=state[t]||{m:false,f:false};state[t][s]=v;saveState();render();}

function card(t){
 const d=document.createElement("div");
 d.className="card"+(isTamed(t)?" tamed":"");
 const top=document.createElement("div");
 top.className="top";
 const icon=document.createElement("div");
 icon.className="icon";
 const img=document.createElement("img");
 img.src=iconUrl(t);
 img.onerror=()=>icon.innerHTML="🦖";
 icon.appendChild(img);
 const name=document.createElement("div");
 name.className="name";
 name.textContent=t;
 top.appendChild(icon);
 top.appendChild(name);
 const checks=document.createElement("div");
 checks.className="checks";
 ["m","f"].forEach(s=>{
   const l=document.createElement("label");
   l.className="chk";
   const i=document.createElement("input");
   i.type="checkbox";
   i.checked=state[t]&&state[t][s];
   i.onchange=e=>toggle(t,s,e.target.checked);
   l.appendChild(i);
   l.appendChild(document.createTextNode(s==="m"?"Mâle":"Femelle"));
   checks.appendChild(l);
 });
 d.appendChild(top);
 d.appendChild(checks);
 return d;
}

function exportJson(){
 const payload={version:1,exportedAt:new Date().toISOString(),dinos:DINO_TITLES,state};
 const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
 const url=URL.createObjectURL(blob);
 const a=document.createElement("a");
 a.href=url;a.download="crocs-mignons-export.json";
 document.body.appendChild(a);a.click();a.remove();
 URL.revokeObjectURL(url);
}

function resetAll(){if(!confirm("Reset : décocher tout ?"))return;state={};saveState();render();}

function render(){
 const grid=document.getElementById("grid");
 const search=(document.getElementById("search").value||"").toLowerCase().trim();
 grid.innerHTML="";
 let tamedCount=0,shown=0;
 DINO_TITLES.forEach(t=>{
   if(search&&!t.toLowerCase().includes(search))return;
   grid.appendChild(card(t));
   shown++;
   if(isTamed(t))tamedCount++;
 });
 document.getElementById("statsText").innerText=tamedCount+" / "+DINO_TITLES.length+" dinos tamés";
 document.getElementById("shownText").innerText="Affichés: "+shown;
 const prog=document.getElementById("prog");
 prog.max=DINO_TITLES.length||1;
 prog.value=tamedCount;
}

document.getElementById("search").addEventListener("input",render);
document.getElementById("reset").addEventListener("click",resetAll);
document.getElementById("export").addEventListener("click",exportJson);

render();
</script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBErcoaYkOucN6ljj-Yv6X32DaOO7DH0Uc",
  authDomain: "les-crocs-mignons.firebaseapp.com",
  databaseURL: "https://les-crocs-mignons-default-rtdb.firebaseio.com/",
  projectId: "les-crocs-mignons",
  storageBucket: "les-crocs-mignons.firebasestorage.app",
  messagingSenderId: "219761916466",
  appId: "1:219761916466:web:ced6cb5116a9ec60019a2b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// 🔥 Sauvegarde vers Firebase à chaque modification
function saveToFirebase() {
  set(ref(db, "crocsMignons"), state);
}

// 🔥 Quand quelqu’un modifie → tout le monde voit
onValue(ref(db, "crocsMignons"), (snapshot) => {
  const data = snapshot.val();
  if (data) {
    state = data;
    localStorage.setItem("crocs_mignons_custom_list_v2", JSON.stringify(state));
    render();
  }
});

// 🔥 On intercepte ta sauvegarde actuelle
const originalSaveState = saveState;
saveState = function() {
  originalSaveState();
  saveToFirebase();
};
</script>
</body>
</html>
