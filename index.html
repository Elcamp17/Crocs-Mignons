<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Connexion - Crocs Mignons</title>
  <style>
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background: url("./fond.png") no-repeat center center fixed;
      background-size: cover;
    }
    .box{
      width:340px;
      background: rgba(0,0,0,0.72);
      color:#fff;
      padding:28px;
      border-radius:18px;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,.45);
      backdrop-filter: blur(2px);
    }
    h1{ margin:0 0 14px; font-size:22px; }
    .sub{ opacity:.9; font-size:14px; margin-bottom:14px; }
    input{
      width:100%;
      box-sizing:border-box;
      padding:12px;
      border:0;
      border-radius:10px;
      font-size:16px;
      margin:10px 0 0;
      outline:none;
    }
    button{
      width:100%;
      padding:12px;
      border:0;
      border-radius:10px;
      background:#4caf50;
      color:white;
      font-weight:800;
      cursor:pointer;
      font-size:16px;
      margin-top:12px;
    }
    button:hover{ background:#2e7d32; }
    button:disabled{ opacity:.7; cursor:wait; }
    .err{ color:#ff8080; min-height:18px; margin-top:10px; font-size:14px; }
    .hint{ margin-top:10px; font-size:12px; opacity:.85; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Accès Crocs Mignons 🦖</h1>
    <div class="sub">Connexion sécurisée (Firebase)</div>
    <input id="email" type="email" placeholder="Email" autocomplete="username" />
    <input id="pw" type="password" placeholder="Mot de passe" autocomplete="current-password" />
    <button id="btn">Se connecter</button>
    <div class="err" id="err"></div>
    <div class="hint">Connecte-toi avec ton utilisateur Firebase (ex: bibi@ark.fr)</div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

    const firebaseConfig = {
  apiKey: "AIzaSyBErcoaYkOucN6ljj-Yv6X32DaOO7DH0Uc",
  authDomain: "les-crocs-mignons.firebaseapp.com",
  databaseURL: "https://les-crocs-mignons-default-rtdb.europe-west1.firebasedatabase.app/",
  projectId: "les-crocs-mignons",
  storageBucket: "les-crocs-mignons.firebasestorage.app",
  messagingSenderId: "219761916466",
  appId: "1:219761916466:web:ced6cb5116a9ec60019a2b"
};

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const emailEl = document.getElementById("email");
    const pwEl = document.getElementById("pw");
    const btn = document.getElementById("btn");
    const err = document.getElementById("err");

    function setErr(msg) {
      err.textContent = msg || "";
    }

    function humanizeAuthError(code) {
      switch(code) {
        case "auth/invalid-email": return "Email invalide";
        case "auth/missing-password": return "Mot de passe manquant";
        case "auth/invalid-credential":
        case "auth/wrong-password":
        case "auth/user-not-found":
        case "auth/invalid-login-credentials":
          return "Identifiants incorrects";
        case "auth/too-many-requests":
          return "Trop de tentatives. Réessaie plus tard.";
        case "auth/network-request-failed":
          return "Problème réseau";
        default:
          return "Connexion impossible";
      }
    }

    async function go() {
      const email = (emailEl.value || "").trim();
      const pw = pwEl.value || "";
      setErr("");
      if (!email || !pw) {
        setErr("Entre ton email et ton mot de passe");
        return;
      }
      btn.disabled = true;
      btn.textContent = "Connexion…";
      try {
        await setPersistence(auth, browserLocalPersistence);
        await signInWithEmailAndPassword(auth, email, pw);
        window.location.href = "./checklist.html";
      } catch (e) {
        console.error(e);
        setErr(humanizeAuthError(e?.code));
      } finally {
        btn.disabled = false;
        btn.textContent = "Se connecter";
      }
    }

    onAuthStateChanged(auth, (user) => {
      if (user) window.location.href = "./checklist.html";
    });

    btn.addEventListener("click", go);
    pwEl.addEventListener("keydown", (e)=>{ if(e.key==="Enter") go(); });
    emailEl.addEventListener("keydown", (e)=>{ if(e.key==="Enter") go(); });
  </script>
</body>
</html>
