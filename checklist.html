<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>L'aventure des Crocs Mignons</title>

<style>
  body {
    margin:0;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    background: linear-gradient(135deg, #e0f7fa, #e8f5e9);
    color:#1b1b1b;
  }
  header {
    background: linear-gradient(90deg, #26a69a, #66bb6a);
    padding:28px 16px;
    text-align:center;
    color:white;
    box-shadow: 0 6px 16px rgba(0,0,0,0.18);
  }
  h1 {
    margin:0;
    font-size:44px;
    font-weight:900;
    letter-spacing:1px;
  }
  .container {
    max-width:1200px;
    margin:22px auto 40px;
    padding:0 16px;
  }
  .controls {
    display:flex;
    gap:10px;
    margin: 14px 0 14px;
    flex-wrap:wrap;
  }
  input[type="search"] {
    flex: 1 1 320px;
    padding:11px 12px;
    border-radius:10px;
    border:1px solid rgba(0,0,0,0.18);
    background: rgba(255,255,255,0.9);
    outline:none;
  }
  button {
    padding:11px 14px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#1e8e84;
    color:white;
    font-weight:800;
  }
  button:hover { background:#16766e; }
  .stats {
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
    margin-bottom: 14px;
    font-weight:800;
  }
  .pill {
    background: rgba(255,255,255,0.75);
    border: 1px solid rgba(0,0,0,0.12);
    border-radius: 999px;
    padding: 8px 10px;
    font-size: 12px;
  }
  progress {
    width: 260px;
    height: 14px;
    border-radius: 999px;
    overflow:hidden;
  }
  .grid {
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    gap:14px;
  }
  .card {
    background:white;
    border-radius:14px;
    padding:12px;
    box-shadow:0 6px 14px rgba(0,0,0,0.10);
    display:flex;
    flex-direction:column;
    gap:10px;
    border: 2px solid transparent;
  }
  .card.tamed { border-color: #4caf50; }
  .top { display:flex; align-items:center; gap:10px; }
  .icon {
    width:52px;
    height:52px;
    border-radius:12px;
    background:#f2f4f6;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    font-size:22px;
    border: 1px solid rgba(0,0,0,0.10);
    flex: 0 0 auto;
  }
  .icon img {
    width:52px;
    height:52px;
    object-fit:cover;
    display:block;
  }
  .name { font-weight:900; font-size:14px; line-height:1.2; }
  .checks { display:flex; gap:10px; margin-top:auto; }
  label.chk {
    flex: 1 1 0;
    font-size:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    padding:9px 10px;
    border-radius:12px;
    border:1px solid rgba(0,0,0,0.10);
    background: rgba(245,247,248,0.9);
    user-select:none;
  }
  label.chk input { transform: scale(1.15); }

  .breed-heart {
    margin-left:auto;
    min-width:28px;
    height:28px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:999px;
    background: rgba(255, 105, 180, 0.14);
    border: 1px solid rgba(255, 105, 180, 0.35);
    color:#d63384;
    font-size:18px;
    line-height:1;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.5);
    cursor:help;
  }

</style>
</head>

<body>
<header>
  <h1>L'aventure des Crocs Mignons 🦖</h1>
</header>

<div class="container">
  <div class="controls">
    <input id="search" type="search" placeholder="Rechercher un dino..." />
    <button id="reset">Reset</button>
    <button id="export">Export JSON</button>
  </div>

  <div class="stats">
    <span class="pill" id="statsText"></span>
    <progress id="prog" value="0" max="1"></progress>
    <span class="pill" id="shownText"></span>
    <span class="pill" id="syncText">Sync: …</span>
  </div>

  <div class="grid" id="grid"></div>
</div>

<script>
// ========= Liste dinos (FR) =========
const LS_KEY = "crocs_mignons_state_v3";
const DINO_TITLES = ['Achatina', 'Allosaure', 'Baudroie abyssale', 'Ankylosaure', 'Aranéo', 'Archéoptéryx', 'Archélon', 'Argentavis', 'Armadoggo', 'Arthropleura', 'Aureliax', 'Baryonyx', 'Basilic', 'Basilosaure', 'Beelzebufo', 'Brontosaure', 'Bulbdog', 'Carbonemys', 'Carcharodontosaure', 'Carnotaure', 'Castoroides', 'Chat', 'Cératosaure', 'Chalicothère', 'Cœlacanthe', 'Compy', 'Cosmo', 'Cryolophosaure', 'Daeodon', 'Deinonychus', 'Deinosuchus', 'Deinotherium', 'Titan du Désert', 'Dilophosaure', 'Dimétrodon', 'Dimorphodon', 'Diplocaulus', 'Diplodocus', 'Ours Sinistre', 'Loup Sinistre', 'Dodo', 'Doedicurus', 'Drakeling Été', 'Drakeling Hiver', 'Drakeling Printemps', 'Drakeling Automne', 'Dreadnoughtus', 'Dreadmare', 'Bousier', 'Dunkleosteus', 'Elderclaw', 'Electrophorus', 'Equus', 'Fasolasuchus', 'Lumicorne (Featherlight)', 'Titan des Forêts', 'Gacha', 'Gallimimus', 'Gasbag', 'Abeille Géante', 'Bison', 'Gigadesmodus', 'Giganotosaure', 'Giganotosaure TEK', 'Gigantopithèque', 'Gigantoraptor', 'Gloon', 'Griffon', 'Helicoprion', 'Hesperornis', 'Hyénodon', 'Titan de Glace', 'Ichthyornis', 'Ichthyosaure', 'Iguanodon', 'Jerboa', 'Kairuku', 'Kaprosuchus', 'Karkinos', 'Kentrosaure', 'Lymantria', 'Lystrosaure', 'Maeguana', 'Malwyn', 'Mammouth', 'Managarmr', 'Manta', 'Mantis', 'Megalania', 'Mégalocéros', 'Mégalodon', 'Mégalosaure', 'Megaraptor', 'Mégathérium', 'Mésopithèque', 'Microraptor', 'Morellatops', 'Mosasaure', 'Moschops', 'Oasisaure', 'Onyc', 'Ossidon', 'Loutre', 'Oviraptor', 'Ovis', 'Pachycéphalosaure (Pachy)', 'Pachyrhinosaure', 'Paraceratherium', 'Parasaure', 'Parasaure TEK', 'Pegomastax', 'Pelagornis', 'Phiomia', 'Phénix', 'Piranha', 'Plésiosaure', 'Procoptodon', 'Ptéranodon', 'Pulmonoscorpius', 'Purlovia', 'Pyromane', 'Quetzal', 'Raptor', 'Raptor TEK', 'Ravageur', 'Faucheur (Reaper)', 'Rex', 'Rex TEK', 'Rhyniognatha', 'Drake des Roches', 'Golem de Pierre', 'Rat des Profondeurs', 'Smilodon (Sabertooth)', 'Saumon Sabertooth', 'Sarcosuchus', 'Shastasaurus', 'Shinehorn', 'Chouette des Neiges', 'Solwyn', 'Spinosaure', 'Stégosaure', 'Stégosaure TEK', 'Tapejara', 'Oiseau-Terreur', 'Thérizinosaure', 'Lézard Épineux', 'Thrall', 'Thylacoleo', 'Titanoboa', 'Titanomyrma', 'Titanosaure', 'Tricératops', 'Troodon', 'Tusoteuthis', 'Licorne', 'Veilwyn', 'Vélonasaure', 'Vautour', 'Rhinocéros Laineux', 'Wyverne de Feu', 'Wyverne de Poison', 'Wyverne de Glace', 'Wyverne de Foudre', 'Wyverne Runique', 'Wyverne Saphir', 'Wyverne Venin', 'Xiphactinus', 'Yi Ling', 'Yutyrannus'];

// Affichage en ordre alphabétique (sans casser les clés de sauvegarde)
const DINO_TITLES_SORTED = [...DINO_TITLES].sort((a,b)=>a.localeCompare(b,'fr',{sensitivity:'base'}));


// Races sans vrai couple ♂/♀ (checkbox unique adaptée)
const SEXLESS_DINO_LABELS = Object.freeze({
  "Abeille Géante": "Reine",
  "Phénix": "Unique",
  "Piranha": "Unique",
  "Saumon Sabertooth": "Unique",
  "Golem de Pierre": "Unique",
  "Titan du Désert": "Unique",
  "Titan des Forêts": "Unique",
  "Titan de Glace": "Unique"
});

function isSexlessDino(title){ return !!SEXLESS_DINO_LABELS[title]; }
function dinoSexOptions(title){
  return isSexlessDino(title)
    ? [{ key: "u", label: SEXLESS_DINO_LABELS[title] || "Unique" }]
    : [{ key: "m", label: "Mâle" }, { key: "f", label: "Femelle" }];
}

const BREED_HINT_STAT_ORDER = [
  ["hp", "Vie"],
  ["stam", "Énergie"],
  ["weight", "Poids"],
  ["melee", "Att"],
  ["food", "Nourriture"],
  ["oxy", "Oxygène"]
];

function getScanStatsForDino(title){
  const root = state && state.__scanStats && state.__scanStats[title];
  return (root && typeof root === "object") ? root : null;
}

function getBreedMismatchInfoForDino(title){
  if (!title || isSexlessDino(title)) return null;
  const dinoState = state && state[title];
  if (!dinoState || !dinoState.m || !dinoState.f) return null;
  const scan = getScanStatsForDino(title);
  const mStats = scan && scan.m && scan.m.bestWild ? scan.m.bestWild : null;
  const fStats = scan && scan.f && scan.f.bestWild ? scan.f.bestWild : null;
  if (!mStats || !fStats) return null;

  const diffs = [];
  let comparable = 0;
  for (const [k, label] of BREED_HINT_STAT_ORDER){
    const mv = Number(mStats[k]);
    const fv = Number(fStats[k]);
    if (!Number.isFinite(mv) || !Number.isFinite(fv)) continue;
    comparable++;
    if (mv !== fv) diffs.push(`${label}: ♂${mv} / ♀${fv}`);
  }
  if (!comparable || !diffs.length) return null;
  return { diffs, comparable };
}

function buildBreedHeartHint(title){
  const info = getBreedMismatchInfoForDino(title);
  if (!info) return null;
  const el = document.createElement("div");
  el.className = "breed-heart";
  el.textContent = "💗";
  const preview = info.diffs.slice(0, 4).join(" • ");
  el.title = `Stats différentes (repro conseillée) : ${preview}${info.diffs.length > 4 ? " …" : ""}`;
  return el;
}

let state = JSON.parse(localStorage.getItem(LS_KEY) || "{}");

function saveState(){ localStorage.setItem(LS_KEY, JSON.stringify(state)); }
function isTamed(t){ return !!(state[t] && (state[t].u || state[t].m || state[t].f)); }
function toggle(t, s, v){
  state[t] = state[t] || {m:false,f:false};
  if (s === "u" && isSexlessDino(t)) {
    state[t].u = !!v;
    if (!v) { state[t].m = false; state[t].f = false; }
  } else {
    state[t][s] = !!v;
  }
  saveState();
  render();
  if (window.__saveToFirebase) window.__saveToFirebase();
}

// ========= Icônes (même logique que ton vieux fichier) =========
// Fandom Special:FilePath + "Nom.png". Si ça rate => emoji 🦖
function iconUrl(t) {
  // On enlève les parenthèses pour les noms type "Lumicorne (Featherlight)"
  const clean = t.replace(/\s*\(.*?\)\s*/g, "").trim();
  // On remplace les espaces par _
  const file = clean.replace(/\s+/g, "_");
  return "https://ark.fandom.com/wiki/Special:FilePath/" + encodeURIComponent(file) + ".png";
}

function card(t) {
  const d = document.createElement("div");
  d.className = "card" + (isTamed(t) ? " tamed" : "");

  const top = document.createElement("div");
  top.className = "top";

  const icon = document.createElement("div");
  icon.className = "icon";

  const img = document.createElement("img");
  img.src = iconUrl(t);
  img.alt = t;
  img.loading = "lazy";
  img.onerror = () => { icon.textContent = "🦖"; };
  icon.appendChild(img);

  const name = document.createElement("div");
  name.className = "name";
  name.textContent = t;

  top.appendChild(icon);
  top.appendChild(name);

  const breedHeart = buildBreedHeartHint(t);
  if (breedHeart) top.appendChild(breedHeart);

  const checks = document.createElement("div");
  checks.className = "checks";

  dinoSexOptions(t).forEach(opt => {
    const l = document.createElement("label");
    l.className = "chk";
    const i = document.createElement("input");
    i.type = "checkbox";
    if (opt.key === "u") {
      i.checked = !!(state[t] && (state[t].u || state[t].m || state[t].f));
    } else {
      i.checked = !!(state[t] && state[t][opt.key]);
    }
    i.onchange = e => toggle(t, opt.key, e.target.checked);
    l.appendChild(i);
    l.appendChild(document.createTextNode(opt.label));
    checks.appendChild(l);
  });

  d.appendChild(top);
  d.appendChild(checks);
  return d;
}

function exportJson() {
  const payload = {version: 3, exportedAt: new Date().toISOString(), dinos: DINO_TITLES, state};
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type: "application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "crocs-mignons-export.json";
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}

function resetAll() {
  if (!confirm("Reset : décocher tout ?")) return;
  state = {};
  saveState();
  render();
  if (window.__saveToFirebase) window.__saveToFirebase(true);
}

function render() {
  const grid = document.getElementById("grid");
  const search = (document.getElementById("search").value || "").toLowerCase().trim();
  grid.innerHTML = "";
  let tamedCount = 0, shown = 0;

  DINO_TITLES_SORTED.forEach(t => {
    if (search && !t.toLowerCase().includes(search)) return;
    grid.appendChild(card(t));
    shown++;
    if (isTamed(t)) tamedCount++;
  });

  document.getElementById("statsText").innerText = tamedCount + " / " + DINO_TITLES.length + " dinos tamés";
  document.getElementById("shownText").innerText = "Affichés: " + shown;
  const prog = document.getElementById("prog");
  prog.max = DINO_TITLES.length || 1;
  prog.value = tamedCount;
}

document.getElementById("search").addEventListener("input", render);
document.getElementById("reset").addEventListener("click", resetAll);
document.getElementById("export").addEventListener("click", exportJson);
render();
</script>

<!-- ========= Firebase Realtime Database (synchro cases entre amis) ========= -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBErcoaYkOucN6ljj-Yv6X32DaOO7DH0Uc",
  authDomain: "les-crocs-mignons.firebaseapp.com",
  databaseURL: "https://les-crocs-mignons-default-rtdb.europe-west1.firebasedatabase.app/",
  projectId: "les-crocs-mignons",
  storageBucket: "les-crocs-mignons.firebasestorage.app",
  messagingSenderId: "219761916466",
  appId: "1:219761916466:web:ced6cb5116a9ec60019a2b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app, firebaseConfig.databaseURL);
const SYNC_PATH = "crocsMignons/state_v3";

const syncText = document.getElementById("syncText");
function setSync(msg){ if(syncText) syncText.textContent = msg; }

// Empêche boucle : quand Firebase met à jour, on ne renvoie pas tout de suite
let applyingRemote = false;

// Sauvegarde vers Firebase
window.__saveToFirebase = async function(force=false){
  if (applyingRemote && !force) return;
  try {
    setSync("Sync: envoi…");
    await set(ref(db, SYNC_PATH), state);
    setSync("Sync: ok ✅");
  } catch(e) {
    console.error(e);
    setSync("Sync: erreur ❌");
  }
};

// Lecture temps réel : tout le monde reçoit
onValue(ref(db, SYNC_PATH), (snapshot) => {
  const data = snapshot.val();
  if (!data) {
    setSync("Sync: vide (init) ⏳");
    return;
  }
  applyingRemote = true;
  state = data;
  localStorage.setItem("crocs_mignons_state_v3", JSON.stringify(state));
  render();
  applyingRemote = false;
  setSync("Sync: reçu ✅");
});
</script>
</body>
</html>
