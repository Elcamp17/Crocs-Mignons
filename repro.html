<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>L'aventure des Crocs Mignons</title>

<style>
  body {
    margin:0;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    background: linear-gradient(135deg, #e0f7fa, #e8f5e9);
    color:#1b1b1b;
  }
  header {
    background: linear-gradient(90deg, #26a69a, #66bb6a);
    padding:28px 16px;
    text-align:center;
    color:white;
    box-shadow: 0 6px 16px rgba(0,0,0,0.18);
  }
  h1 {
    margin:0;
    font-size:44px;
    font-weight:900;
    letter-spacing:1px;
  }
  .container {
    max-width:1200px;
    margin:22px auto 40px;
    padding:0 16px;
  }
  .controls {
    display:flex;
    gap:10px;
    margin: 14px 0 14px;
    flex-wrap:wrap;
  }
  input[type="search"] {
    flex: 1 1 320px;
    padding:11px 12px;
    border-radius:10px;
    border:1px solid rgba(0,0,0,0.18);
    background: rgba(255,255,255,0.9);
    outline:none;
  }
  button {
    padding:11px 14px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#1e8e84;
    color:white;
    font-weight:800;
  }
  button:hover { background:#16766e; }
  .stats {
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
    margin-bottom: 14px;
    font-weight:800;
  }
  .pill {
    background: rgba(255,255,255,0.75);
    border: 1px solid rgba(0,0,0,0.12);
    border-radius: 999px;
    padding: 8px 10px;
    font-size: 12px;
  }
  progress {
    width: 260px;
    height: 14px;
    border-radius: 999px;
    overflow:hidden;
  }
  .grid {
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    gap:14px;
  }
  .card {
    background:white;
    border-radius:14px;
    padding:12px;
    box-shadow:0 6px 14px rgba(0,0,0,0.10);
    display:flex;
    flex-direction:column;
    gap:10px;
    border: 2px solid transparent;
  }
  .card.tamed { border-color: #4caf50; }
  .top { display:flex; align-items:center; gap:10px; }
  .icon {
    width:52px;
    height:52px;
    border-radius:12px;
    background:#f2f4f6;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    font-size:22px;
    border: 1px solid rgba(0,0,0,0.10);
    flex: 0 0 auto;
  }
  .icon img {
    width:52px;
    height:52px;
    object-fit:cover;
    display:block;
  }
  .name { font-weight:900; font-size:14px; line-height:1.2; }
  .checks { display:flex; gap:10px; margin-top:auto; }
  label.chk {
    flex: 1 1 0;
    font-size:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    padding:9px 10px;
    border-radius:12px;
    border:1px solid rgba(0,0,0,0.10);
    background: rgba(245,247,248,0.9);
    user-select:none;
  }
  label.chk input { transform: scale(1.15); }

  .boss-card {
    border: 2px solid rgba(30,142,132,.18);
    gap: 12px;
  }
  .boss-map {
    font-weight: 900;
    font-size: 16px;
    color:#0f5f58;
  }
  .boss-sub {
    font-size: 12px;
    color:#4a5560;
    font-weight: 700;
  }
  .boss-list {
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .boss-entry {
    border:1px solid rgba(0,0,0,.10);
    border-radius:12px;
    padding:10px;
    background: rgba(248,250,251,.95);
  }
  .boss-entry-top {
    display:flex;
    align-items:center;
    gap:8px;
    justify-content:space-between;
    flex-wrap:wrap;
  }
  .boss-entry-name {
    font-weight: 900;
    font-size: 14px;
    line-height: 1.2;
  }
  .boss-entry-note {
    font-size: 12px;
    color:#54606a;
    line-height:1.25;
    margin-top: 6px;
  }
  .diffs {
    display:flex;
    gap:6px;
    flex-wrap:wrap;
    margin-top:8px;
  }
  .diff {
    border-radius:999px;
    padding:4px 8px;
    font-size:11px;
    font-weight:900;
    color:white;
    border:1px solid rgba(0,0,0,.12);
  }
  .diff.gamma { background:#43a047; }
  .diff.beta  { background:#fb8c00; }
  .diff.alpha { background:#e53935; }
  .diff.na { background:#b0bec5; color:#223; }


  .controls button.active {
    background:#0f6b63;
    box-shadow: inset 0 0 0 2px rgba(255,255,255,.28);
  }
  #backMenuBtn { background:#6d4c41; }
  #backMenuBtn:hover { background:#5b3f36; }

  .dashboard {
    display:grid;
    grid-template-columns: 1.15fr .85fr;
    gap:14px;
    margin-bottom:14px;
  }
  .dash-card {
    background:white;
    border-radius:14px;
    padding:14px;
    box-shadow:0 6px 14px rgba(0,0,0,0.10);
    border:1px solid rgba(0,0,0,.06);
  }
  .dash-card.wide {
    grid-column: 1 / -1;
  }
  .dash-title {
    margin:0 0 10px 0;
    font-size:16px;
    font-weight:900;
    color:#0f5f58;
  }
  .dash-sub {
    margin:0 0 10px 0;
    font-size:12px;
    color:#5a6a73;
    font-weight:700;
  }
  .dash-metrics {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap:10px;
  }
  .metric {
    border-radius:12px;
    border:1px solid rgba(0,0,0,.08);
    background: rgba(248,250,251,.95);
    padding:10px;
  }
  .metric .label {
    font-size:11px;
    color:#5b6770;
    font-weight:800;
    text-transform:uppercase;
    letter-spacing:.3px;
  }
  .metric .big {
    font-size:21px;
    font-weight:900;
    line-height:1.15;
    margin-top:4px;
  }
  .metric .small {
    font-size:12px;
    color:#54606a;
    margin-top:3px;
    font-weight:700;
  }
  .dash-progress-row {
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    margin-top:10px;
  }
  .dash-progress-row progress {
    flex:1 1 240px;
    width:auto;
  }
  .chart-wrap {
    border:1px solid rgba(0,0,0,.08);
    border-radius:12px;
    background: linear-gradient(180deg, rgba(38,166,154,.04), rgba(102,187,106,.03));
    padding:10px;
  }
  .chart-head {
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap:8px;
    flex-wrap:wrap;
    margin-bottom:8px;
  }
  .chart-head .value {
    font-size:20px;
    font-weight:900;
  }
  .chart-head .caption {
    font-size:12px;
    color:#56626b;
    font-weight:700;
  }
  .chart-svg {
    width:100%;
    height:220px;
    display:block;
  }
  .chart-axes {
    display:flex;
    justify-content:space-between;
    gap:8px;
    margin-top:4px;
    color:#60707a;
    font-size:11px;
    font-weight:700;
  }
  .empty-note {
    font-size:12px;
    color:#60707a;
    font-weight:700;
  }
  @media (max-width: 820px) {
    .dashboard { grid-template-columns: 1fr; }
    .dash-card.wide { grid-column: auto; }
    .chart-svg { height:190px; }
  }


  /* === OCR Scan === */
  #scanBtn { background:#7b1fa2; }
  #scanBtn:hover { background:#681a8c; }
  .scan-panel {
    display:none;
    margin: 4px 0 14px;
    background: rgba(255,255,255,.95);
    border:1px solid rgba(0,0,0,.08);
    border-radius:14px;
    box-shadow:0 6px 14px rgba(0,0,0,0.08);
    padding:12px;
  }
  .scan-panel.open { display:block; }
  .scan-head {
    display:flex;
    gap:10px;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    margin-bottom:10px;
  }
  .scan-title {
    margin:0;
    font-size:15px;
    font-weight:900;
    color:#5e2a7a;
  }
  .scan-actions {
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    align-items:center;
  }
  .scan-actions button.secondary {
    background:#455a64;
  }
  .scan-actions button.secondary:hover {
    background:#37474f;
  }
  .scan-grid {
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:12px;
  }
  .drop-zone {
    border:2px dashed rgba(123,31,162,.35);
    border-radius:12px;
    padding:12px;
    min-height:140px;
    background: linear-gradient(180deg, rgba(123,31,162,.04), rgba(38,166,154,.03));
    display:flex;
    flex-direction:column;
    gap:10px;
    justify-content:center;
  }
  .drop-zone.dragover {
    border-color: rgba(123,31,162,.8);
    background: linear-gradient(180deg, rgba(123,31,162,.08), rgba(38,166,154,.05));
  }
  .drop-zone .dz-main {
    font-weight:900;
    color:#4b5961;
    font-size:13px;
  }
  .drop-zone .dz-sub {
    font-size:12px;
    color:#5f6d76;
    font-weight:700;
    line-height:1.3;
  }
  .paste-box {
    width:100%;
    min-height:140px;
    resize:vertical;
    border:1px solid rgba(0,0,0,.12);
    border-radius:12px;
    padding:10px 12px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    background:#fbfcfd;
    outline:none;
  }
  .scan-status {
    font-size:12px;
    font-weight:800;
    color:#4b5961;
    margin-top:8px;
    min-height:18px;
    white-space:pre-wrap;
  }
  .scan-preview {
    margin-top:8px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    align-items:flex-start;
  }
  .scan-preview img {
    max-width:220px;
    width:100%;
    border-radius:12px;
    border:1px solid rgba(0,0,0,.1);
    background:#f2f4f6;
  }
  .scan-result {
    flex:1 1 280px;
    border:1px solid rgba(0,0,0,.08);
    border-radius:12px;
    padding:10px;
    background:rgba(248,250,251,.9);
    font-size:12px;
    line-height:1.35;
    color:#324047;
  }
  .scan-result .row { margin-bottom:6px; }
  .scan-result .ok { color:#0f6b63; font-weight:900; }
  .scan-result .warn { color:#8a4b00; font-weight:900; }
  .scan-result .err { color:#b71c1c; font-weight:900; }
  .ocr-recap {
    border:1px solid rgba(123,31,162,.14);
    border-radius:12px;
    background: linear-gradient(180deg, rgba(123,31,162,.05), rgba(123,31,162,.03));
    padding:8px;
    display:grid;
    gap:8px;
  }
  .ocr-recap-sex {
    border:1px solid rgba(123,31,162,.10);
    border-radius:10px;
    background: rgba(255,255,255,.55);
    padding:7px;
    display:grid;
    gap:6px;
  }
  .ocr-recap-head {
    display:flex;
    align-items:center;
    gap:8px;
    min-width:0;
  }
  .ocr-recap-head .sex {
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:20px;
    height:20px;
    border-radius:999px;
    background: rgba(123,31,162,.12);
    color:#5e2a7a;
    font-weight:900;
    font-size:12px;
    flex:0 0 auto;
  }
  .ocr-recap-head .count {
    color:#60707a;
    font-weight:800;
    font-size:11px;
    margin-left:auto;
    white-space:nowrap;
  }
  .ocr-recap-clear {
    border:1px solid rgba(183,28,28,.22);
    background:#fff;
    color:#b71c1c;
    border-radius:999px;
    width:22px;
    height:22px;
    line-height:20px;
    font-weight:900;
    cursor:pointer;
    flex:0 0 auto;
    padding:0;
  }
  .ocr-recap-clear:hover { background:#fff3f3; }
  .ocr-recap-grid {
    display:grid;
    grid-template-columns:repeat(2, minmax(0,1fr));
    gap:4px 6px;
  }
  .ocr-recap-cell {
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:6px;
    border:1px solid rgba(123,31,162,.08);
    background: rgba(123,31,162,.035);
    border-radius:7px;
    padding:3px 6px;
    min-width:0;
    font-size:11px;
    line-height:1.2;
  }
  .ocr-recap-cell .k {
    color:#5b6a73;
    font-weight:700;
    white-space:nowrap;
  }
  .ocr-recap-cell .v {
    color:#253238;
    font-weight:900;
    margin-left:auto;
    white-space:nowrap;
  }

  .dash-nav-grid {
    display:grid;
    grid-template-columns:repeat(3, minmax(0,1fr));
    gap:14px;
    margin: 8px 0 14px;
  }
  .dash-nav-card {
    position:relative;
    overflow:hidden;
    border:none;
    border-radius:18px;
    min-height:126px;
    padding:12px 14px;
    text-align:left;
    color:#fff;
    cursor:pointer;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    gap:4px;
    box-shadow: 0 12px 28px rgba(18,47,46,.18);
    transition: transform .14s ease, box-shadow .14s ease, filter .14s ease;
    text-decoration:none;
    isolation:isolate;
    background:
      linear-gradient(180deg, rgba(255,255,255,.06), rgba(0,0,0,.05)),
      linear-gradient(135deg, rgba(18,60,58,.94), rgba(27,87,84,.94));
  }
  .dash-nav-card::before {
    content:"";
    position:absolute; inset:0;
    background-image: var(--card-art);
    background-repeat:no-repeat;
    background-position:right 10px center;
    background-size:auto 92%;
    opacity:.95;
    z-index:-2;
    filter: drop-shadow(0 4px 10px rgba(0,0,0,.25));
  }
  .dash-nav-card::after {
    content:"";
    position:absolute; inset:0;
    background:
      linear-gradient(90deg, rgba(8,18,22,.86) 0%, rgba(10,20,25,.72) 45%, rgba(10,20,25,.20) 80%, rgba(10,20,25,0) 100%);
    z-index:-1;
  }
  .dash-nav-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 16px 34px rgba(18,47,46,.22);
    filter: saturate(1.03);
  }
  .dash-nav-card:active { transform: translateY(0); }
  .dash-nav-card .tag {
    align-self:flex-start;
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:11px;
    font-weight:900;
    text-transform:uppercase;
    letter-spacing:.4px;
    border-radius:999px;
    background: rgba(255,255,255,.16);
    border:1px solid rgba(255,255,255,.22);
    padding:4px 8px;
    backdrop-filter: blur(2px);
  }
  .dash-nav-card .name {
    font-size:22px;
    font-weight:900;
    line-height:1;
    text-shadow: 0 1px 8px rgba(0,0,0,.32);
  }
  .dash-nav-card .desc {
    font-size:12px;
    font-weight:800;
    color: rgba(244,249,250,.95);
    text-shadow: 0 1px 6px rgba(0,0,0,.28);

  /* === Refresh design dashboard + boutons image (patch esthétique) === */
  body {
    background:
      radial-gradient(1200px 500px at 20% -10%, rgba(38,166,154,.16), transparent 60%),
      radial-gradient(900px 420px at 100% 0%, rgba(102,187,106,.14), transparent 55%),
      linear-gradient(135deg, #ecf7f5 0%, #e6f3ef 35%, #edf7fb 100%);
  }
  header {
    background:
      linear-gradient(120deg, rgba(22,113,106,.95), rgba(67,160,71,.92)),
      linear-gradient(90deg, #26a69a, #66bb6a);
    box-shadow: 0 10px 24px rgba(12,52,61,0.22);
  }
  h1 {
    text-shadow: 0 2px 12px rgba(0,0,0,.18);
  }
  .container {
    max-width: 1320px;
    margin-top: 18px;
  }

  .controls {
    display:grid;
    grid-template-columns: repeat(12, minmax(0, 1fr));
    gap:12px;
    align-items:stretch;
    margin: 8px 0 18px;
    padding: 12px;
    border-radius: 22px;
    background: linear-gradient(180deg, rgba(255,255,255,.78), rgba(255,255,255,.64));
    border: 1px solid rgba(18,76,88,.10);
    box-shadow: 0 14px 28px rgba(8,45,54,.08), inset 0 1px 0 rgba(255,255,255,.65);
    backdrop-filter: blur(8px);
  }
  .controls > * {
    min-width: 0;
  }

  /* Boutons principaux image (dashboard) */
  #dinoBtn, #bossBtn {
    grid-column: span 6;
    min-height: 168px;
    border-radius: 22px;
    padding: 16px 18px;
    position: relative;
    overflow: hidden;
    display:flex;
    align-items:flex-end;
    justify-content:flex-start;
    text-align:left;
    color: #fff;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: .5px;
    line-height: 1;
    border: 1px solid rgba(255,255,255,.25);
    box-shadow:
      0 14px 28px rgba(0,0,0,.20),
      inset 0 -70px 90px rgba(0,0,0,.45),
      inset 0 0 0 1px rgba(255,255,255,.12);
    text-shadow: 0 2px 14px rgba(0,0,0,.65);
    transition: transform .15s ease, box-shadow .2s ease, filter .2s ease;
    background-size: cover;
    background-position: center center;
    background-repeat: no-repeat;
  }

  #dinoBtn::before, #bossBtn::before {
    content: "";
    position:absolute;
    inset:0;
    pointer-events:none;
    background:
      radial-gradient(240px 90px at 20% 0%, rgba(255,255,255,.14), transparent 70%),
      linear-gradient(135deg, rgba(255,255,255,.03), transparent 40%);
  }
  #dinoBtn::after {
    content: "Checklist des créatures";
  }
  #bossBtn::after {
    content: "Boss & difficultés";
  }
  #dinoBtn::after, #bossBtn::after {
    position:absolute;
    top:12px;
    left:14px;
    padding: 5px 9px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 800;
    color: rgba(255,255,255,.95);
    letter-spacing: .25px;
    background: rgba(0,0,0,.28);
    border: 1px solid rgba(255,255,255,.18);
    box-shadow: 0 4px 10px rgba(0,0,0,.12);
    text-shadow: none;
  }
  #dinoBtn:hover, #bossBtn:hover {
    background-color: transparent;
    transform: translateY(-2px);
    filter: saturate(1.08);
    box-shadow:
      0 18px 34px rgba(0,0,0,.24),
      inset 0 -70px 90px rgba(0,0,0,.45),
      inset 0 0 0 1px rgba(255,255,255,.16);
  }
  #dinoBtn.active, #bossBtn.active {
    box-shadow:
      0 18px 34px rgba(0,0,0,.24),
      inset 0 -70px 90px rgba(0,0,0,.45),
      inset 0 0 0 2px rgba(255,255,255,.35);
  }

  /* Actions secondaires */
  #scanBtn, #backMenuBtn, #logoutBtn {
    grid-column: span 4;
    min-height: 46px;
    border-radius: 14px;
    font-size: 14px;
    font-weight: 900;
    letter-spacing:.2px;
    box-shadow: 0 6px 14px rgba(9,34,41,.12);
  }
  #scanBtn {
    background: linear-gradient(135deg, #8e24aa, #6a1b9a);
  }
  #scanBtn:hover {
    background: linear-gradient(135deg, #7d1f96, #5c1787);
  }
  #backMenuBtn {
    background: linear-gradient(135deg, #6d4c41, #5d4037);
  }
  #backMenuBtn:hover {
    background: linear-gradient(135deg, #614339, #50342d);
  }
  #logoutBtn {
    background: linear-gradient(135deg, #d32f2f, #b71c1c) !important;
  }
  #logoutBtn:hover {
    background: linear-gradient(135deg, #c62828, #a91414) !important;
  }

  #search {
    grid-column: 1 / -1;
    min-height: 48px;
    border-radius: 14px;
    padding: 12px 14px;
    border: 1px solid rgba(16,76,88,.14);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.7);
    background: rgba(255,255,255,.86);
  }

  .dashboard {
    gap: 18px;
    margin-bottom: 18px;
  }
  .dash-card {
    border-radius: 20px;
    padding: 16px;
    background: linear-gradient(180deg, rgba(255,255,255,.94), rgba(255,255,255,.84));
    border: 1px solid rgba(17,79,90,.08);
    box-shadow: 0 14px 28px rgba(8,45,54,.08);
  }
  .dash-card.wide {
    position: relative;
    overflow: hidden;
    background:
      radial-gradient(620px 240px at 5% 0%, rgba(38,166,154,.13), transparent 70%),
      radial-gradient(460px 200px at 100% 0%, rgba(102,187,106,.11), transparent 70%),
      linear-gradient(180deg, rgba(255,255,255,.95), rgba(255,255,255,.88));
  }
  .dash-card.wide::after {
    content:"";
    position:absolute;
    inset:auto -80px -100px auto;
    width: 260px;
    height: 260px;
    border-radius: 999px;
    background: radial-gradient(circle, rgba(38,166,154,.12), rgba(38,166,154,0));
    pointer-events:none;
  }
  .dash-title {
    font-size: 20px;
    margin-bottom: 8px;
    color: #0c635c;
  }
  .dash-sub {
    font-size: 12px;
    color:#4e616b;
    margin-bottom: 12px;
  }
  .dash-metrics {
    gap: 12px;
    grid-template-columns: repeat(4, minmax(0, 1fr));
  }
  .metric {
    border-radius: 16px;
    padding: 12px;
    background: linear-gradient(180deg, rgba(255,255,255,.9), rgba(246,250,252,.9));

function bossStateRoot(create=false) {
  if (!state || typeof state !== "object" || Array.isArray(state)) state = {};
  if (!state.__boss || typeof state.__boss !== "object" || Array.isArray(state.__boss)) {
    if (!create) return null;
    state.__boss = {};
  }
  return state.__boss;
}

function bossKey(mapName, bossName) {
  return String(mapName || "") + "||" + String(bossName || "");
}

function getBossChecks(mapName, bossName) {
  const root = bossStateRoot(false);
  const k = bossKey(mapName, bossName);
  const x = (root && root[k]) || {};
  return {
    g: !!x.g,
    b: !!x.b,
    a: !!x.a,
    done: !!x.done
  };
}

function setBossCheck(mapName, bossName, field, value) {
  const root = bossStateRoot(true);
  const k = bossKey(mapName, bossName);
  root[k] = root[k] || { g:false, b:false, a:false, done:false };
  root[k][field] = !!value;
  maybeRecordProgressSnapshot();
  saveState();
  render();
  if (window.__saveToFirebase) window.__saveToFirebase();
}

function difficultyChips(mode, mapName, bossName) {
  const wrap = document.createElement("div");
  wrap.className = "diffs";
  const checks = getBossChecks(mapName, bossName);

  const addCheck = (label, cls, field, checked, disabled=false) => {
    const lab = document.createElement("label");
    lab.className = "diff " + cls + (checked ? " done" : "") + (disabled ? " is-disabled" : "");
    const input = document.createElement("input");
    input.type = "checkbox";
    input.checked = !!checked;
    input.disabled = !!disabled;
    input.addEventListener("change", (e) => {
      setBossCheck(mapName, bossName, field, e.target.checked);
    });
    lab.appendChild(input);
    const span = document.createElement("span");
    span.textContent = label;
    lab.appendChild(span);
    wrap.appendChild(lab);
  };

  if (mode === "na") {
    addCheck("Fait", "na", "done", checks.done, false);
    return wrap;
  }

  addCheck("Gamma", "gamma", "g", checks.g, false);
  addCheck("Beta", "beta", "b", checks.b, false);
  addCheck("Alpha", "alpha", "a", checks.a, false);
  return wrap;
}

function renderBosses() {
  const grid = document.getElementById("grid");
  const search = (document.getElementById("search").value || "").toLowerCase().trim();
  grid.innerHTML = "";
  let shownMaps = 0, shownBosses = 0, doneUnits = 0, totalUnits = 0;

  BOSS_MAPS.forEach(entry => {
    const haystack = [
      entry.map,
      ...(entry.aliases || []),
      entry.note || "",
      ...(entry.bosses || []).map(b => (b.name + " " + (b.note || "")))
    ].join(" ").toLowerCase();
    if (search && !haystack.includes(search)) return;

    const d = document.createElement("div");
    d.className = "card boss-card";

    const top = document.createElement("div"); top.className = "top";
    const icon = document.createElement("div"); icon.className = "icon"; icon.textContent = "👑";
    const meta = document.createElement("div");
    const mapName = document.createElement("div"); mapName.className = "boss-map"; mapName.textContent = entry.map;
    const sub = document.createElement("div"); sub.className = "boss-sub"; sub.textContent = (entry.aliases && entry.aliases[0]) ? ("Map code: " + entry.aliases[0]) : "Boss";
    meta.appendChild(mapName); meta.appendChild(sub);
    top.appendChild(icon); top.appendChild(meta);

    const list = document.createElement("div"); list.className = "boss-list";
    (entry.bosses || []).forEach(b => {
      shownBosses++;
      const bc = getBossChecks(entry.map, b.name);
      if ((b.difficulties || "gba") === "na") {
        totalUnits += 1;
        if (bc.done) doneUnits += 1;
      } else {
        totalUnits += 3;
        if (bc.g) doneUnits += 1;
        if (bc.b) doneUnits += 1;
        if (bc.a) doneUnits += 1;
      }
      const row = document.createElement("div"); row.className = "boss-entry";
      const rowTop = document.createElement("div"); rowTop.className = "boss-entry-top";
      const title = document.createElement("div"); title.className = "boss-entry-name"; title.textContent = b.name;
      rowTop.appendChild(title);
      row.appendChild(rowTop);
      row.appendChild(difficultyChips(b.difficulties || "gba", entry.map, b.name));
      if (b.note) {
        const n = document.createElement("div"); n.className = "boss-entry-note"; n.textContent = b.note; row.appendChild(n);
      }
      list.appendChild(row);
    });
    if (entry.note) {
      const note = document.createElement("div"); note.className = "boss-entry-note"; note.textContent = entry.note; list.appendChild(note);
    }

    d.appendChild(top); d.appendChild(list); grid.appendChild(d);
    shownMaps++;
  });

  document.getElementById("statsText").innerText = shownBosses + " boss listés" + (totalUnits ? (" · " + doneUnits + "/" + totalUnits + " difficultés cochées") : "");
  document.getElementById("shownText").innerText = "Maps affichées: " + shownMaps + " / " + BOSS_MAPS.length;
  const prog = document.getElementById("prog");
  prog.max = Math.max(1, shownBosses);
  prog.value = shownBosses;
}

function updateViewButtons() {

  if (bossBtn) bossBtn.classList.toggle("active", currentView === "bosses");

  if (currentView === "dashboard") {
    if (search) { search.style.display = "none"; search.value = ""; }

    if (bossBtn) bossBtn.style.display = "";

    if (dash) dash.style.display = "grid";
    if (statsBar) statsBar.style.display = "none";

    return;
  }

  if (search) {
    search.style.display = "";
    search.placeholder = currentView === "bosses"
      ? "Rechercher une map ou un boss..."
      : "Rechercher un dino...";
  }

  if (dinoBtn) dinoBtn.style.display = "none";
  if (bossBtn) bossBtn.style.display = "none";
  if (scanBtn) scanBtn.style.display = "";
  if (backBtn) backBtn.style.display = "";

}

function setView(view) {
  if (view === "bosses") currentView = "bosses";
  else if (view === "dinos") currentView = "dinos";
  else currentView = "dashboard";

  render();
}


function saveState(){ localStorage.setItem(LS_KEY, JSON.stringify(state)); }
function isTamed(t){ return state[t] && (state[t].m || state[t].f); }
function toggle(t, s, v){
  state[t] = state[t] || {m:false,f:false};
  state[t][s] = v;
  maybeRecordProgressSnapshot();
  saveState();
  render();
  if (window.__saveToFirebase) window.__saveToFirebase();
}


// ========= Tableau de bord / stats globales =========
const HISTORY_LIMIT = 240;

function ensureMetaRoot(create=false) {
  if (!state || typeof state !== "object" || Array.isArray(state)) state = {};
  if (!state.__meta || typeof state.__meta !== "object" || Array.isArray(state.__meta)) {
    if (!create) return null;
    state.__meta = {};
  }
  return state.__meta;
}

function getHistory(create=false) {
  const meta = ensureMetaRoot(create);
  if (!meta) return [];
  if (!Array.isArray(meta.progressHistory)) {
    if (!create) return [];
    meta.progressHistory = [];
  }
  return meta.progressHistory;
}

function countDinosDone() {
  let done = 0;
  for (const t of DINO_TITLES) if (isTamed(t)) done++;
  return done;
}

function countDinoSexChecks() {
  let done = 0;
  for (const t of DINO_TITLES) {
    const x = state[t] || {};
    if (x.m) done++;
    if (x.f) done++;
  }
  return done;
}

function getBossSummary() {
  let maps = BOSS_MAPS.length;
  let bossEntriesTotal = 0;
  let bossEntriesDone = 0;
  let unitsTotal = 0;
  let unitsDone = 0;

  for (const entry of BOSS_MAPS) {
    for (const b of (entry.bosses || [])) {
      bossEntriesTotal++;
      const c = getBossChecks(entry.map, b.name);
      if ((b.difficulties || "gba") === "na") {
        unitsTotal += 1;
        if (c.done) { unitsDone += 1; bossEntriesDone += 1; }
      } else {
        unitsTotal += 3;
        if (c.g) unitsDone++;
        if (c.b) unitsDone++;
        if (c.a) unitsDone++;
        if (c.g && c.b && c.a) bossEntriesDone++;
      }
    }
  }

  return {
    maps,
    bossEntriesTotal,
    bossEntriesDone,
    bossEntriesRemaining: Math.max(0, bossEntriesTotal - bossEntriesDone),
    unitsTotal,
    unitsDone,
    unitsRemaining: Math.max(0, unitsTotal - unitsDone)
  };
}

function currentProgressSnapshot() {
  const boss = getBossSummary();
  return {
    ts: Date.now(),
    dinoDone: countDinosDone(),
    dinoSexChecks: countDinoSexChecks(),
    bossUnitsDone: boss.unitsDone,
    bossUnitsTotal: boss.unitsTotal,
    bossEntriesDone: boss.bossEntriesDone,
    bossEntriesTotal: boss.bossEntriesTotal
  };
}

function maybeRecordProgressSnapshot(force=false) {
  const h = getHistory(true);
  const snap = currentProgressSnapshot();
  const last = h.length ? h[h.length - 1] : null;

  const changed = !last ||
    last.dinoDone !== snap.dinoDone ||
    last.bossUnitsDone !== snap.bossUnitsDone ||
    last.dinoSexChecks !== snap.dinoSexChecks;

  if (!force && !changed) return false;

  if (last && force) {
    // évite de spammer si la page rerender sans vraie progression
    const ageMs = Math.abs((snap.ts || 0) - (last.ts || 0));
    if (!changed && ageMs < 60_000) return false;
  }

  h.push(snap);
  if (h.length > HISTORY_LIMIT) h.splice(0, h.length - HISTORY_LIMIT);
  return true;
}

function ensureProgressHistorySeed() {
  if (maybeRecordProgressSnapshot(true)) {
    try { saveState(); } catch(_e) {}
  }
}

function formatShortDate(ts) {
  try {
    const d = new Date(ts);
    if (Number.isNaN(d.getTime())) return "—";
    return d.toLocaleDateString("fr-FR", { day:"2-digit", month:"2-digit" });
  } catch(_e) { return "—"; }
}

function buildLineChartSvg(history, kind, maxY) {
  const width = 800, height = 220;
  const padL = 34, padR = 12, padT = 12, padB = 26;
  const innerW = width - padL - padR;
  const innerH = height - padT - padB;

  const points = (history || []).map((h, idx) => ({
    x: padL + (history.length <= 1 ? 0 : (idx * innerW / (history.length - 1))),
    yv: Number(kind === "boss" ? (h.bossUnitsDone ?? 0) : (h.dinoDone ?? 0)),
  }));

  const safeMax = Math.max(1, Number(maxY) || 1);
  const ptStr = points.map(p => {
    const y = padT + innerH - (Math.max(0, Math.min(safeMax, p.yv)) / safeMax) * innerH;
    return `${p.x.toFixed(1)},${y.toFixed(1)}`;
  }).join(" ");

  const lastVal = points.length ? points[points.length - 1].yv : 0;
  const lastY = points.length ? (padT + innerH - (Math.max(0, Math.min(safeMax, lastVal)) / safeMax) * innerH) : (padT + innerH);
  const areaPts = points.length
    ? `${padL},${padT + innerH} ${ptStr} ${padL + innerW},${padT + innerH}`
    : "";

  const gridLines = [0, 0.25, 0.5, 0.75, 1].map(r => {
    const y = (padT + innerH - r * innerH).toFixed(1);
    return `<line x1="${padL}" y1="${y}" x2="${padL + innerW}" y2="${y}" stroke="rgba(0,0,0,.08)" stroke-width="1" />`;
  }).join("");

  const yTicks = [1, 0.5, 0].map(r => {
    const y = (padT + innerH - r * innerH).toFixed(1);
    const v = Math.round(r * safeMax);
    return `<text x="${padL - 6}" y="${Number(y)+4}" text-anchor="end" font-size="10" fill="#66757f" font-weight="700">${v}</text>`;
  }).join("");

  if (!points.length) {
    return `<svg class="chart-svg" viewBox="0 0 ${width} ${height}" aria-label="Aucune donnée"><text x="${width/2}" y="${height/2}" text-anchor="middle" font-size="13" fill="#66757f" font-weight="700">Aucune donnée pour le moment</text></svg>`;
  }

  return `<svg class="chart-svg" viewBox="0 0 ${width} ${height}" aria-label="Graphique progression">
    ${gridLines}
    <line x1="${padL}" y1="${padT + innerH}" x2="${padL + innerW}" y2="${padT + innerH}" stroke="rgba(0,0,0,.18)" stroke-width="1.2"/>
    <line x1="${padL}" y1="${padT}" x2="${padL}" y2="${padT + innerH}" stroke="rgba(0,0,0,.12)" stroke-width="1"/>
    ${yTicks}
    <polyline points="${areaPts}" fill="rgba(38,166,154,.10)" stroke="none"></polyline>
    <polyline points="${ptStr}" fill="none" stroke="rgba(30,142,132,.95)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></polyline>
    <circle cx="${(padL + innerW).toFixed(1)}" cy="${lastY.toFixed(1)}" r="4" fill="rgba(30,142,132,1)"></circle>
  </svg>`;
}

// ========= OCR Scan Stats (images -> coche auto + récap stats) =========
const SCAN_LIB_KEY = "__tesseractLibLoaded";
let __scanBusy = false;
let __scanLastImageDataUrl = "";
let __scanUiInit = false;
let __scanPending = null;

function scanStatsRoot(create=false) {
  if (!state || typeof state !== "object" || Array.isArray(state)) state = {};
  if (!state.__scanStats || typeof state.__scanStats !== "object" || Array.isArray(state.__scanStats)) {
    if (!create) return null;
    state.__scanStats = {};
  }
  return state.__scanStats;
}

function getScanStatsForDino(title) {
  const root = scanStatsRoot(false);
  if (!root) return null;
  const x = root[title];
  return (x && typeof x === "object") ? x : null;
}

function emptyStatBlock() {
  return {
    count: 0,
    updatedAt: 0,
    bestWild: {},
    bestTamed: {},
    lastWild: {},
    lastTamed: {}
  };
}

function mergeBestStats(target, incoming) {
  target = target || {};
  incoming = incoming || {};
  for (const [k, v] of Object.entries(incoming)) {
    const n = Number(v);
    if (!Number.isFinite(n)) continue;
    if (!Number.isFinite(Number(target[k])) || n > Number(target[k])) target[k] = n;
  }
  return target;
}

function upsertScanStats(title, sex, parsed) {
  if (!title || !sex) return;
  const root = scanStatsRoot(true);
  root[title] = root[title] || {};
  root[title][sex] = root[title][sex] || emptyStatBlock();
  const slot = root[title][sex];
  slot.count = Number(slot.count || 0) + 1;
  slot.updatedAt = Date.now();
  slot.lastWild = parsed?.stats?.wild || {};
  slot.lastTamed = parsed?.stats?.tamed || {};
  slot.bestWild = mergeBestStats(slot.bestWild || {}, parsed?.stats?.wild || {});
  slot.bestTamed = mergeBestStats(slot.bestTamed || {}, parsed?.stats?.tamed || {});
}

function clearScanStatsForDino(title, sexKey) {
  const root = scanStatsRoot(false);
  if (!root || !title || !root[title]) return false;

  if (sexKey === "m" || sexKey === "f") {
    delete root[title][sexKey];
    const hasM = !!(root[title] && root[title].m && (Object.keys(root[title].m.bestWild || {}).length || Object.keys(root[title].m.bestTamed || {}).length));
    const hasF = !!(root[title] && root[title].f && (Object.keys(root[title].f.bestWild || {}).length || Object.keys(root[title].f.bestTamed || {}).length));
    if (!hasM && !hasF) delete root[title];
  } else {
    delete root[title];
  }

  saveState();
  try { if (typeof window.__saveToFirebase === "function") window.__saveToFirebase(); } catch(_e) {}
  render();
  return true;
}

function statOrderRecap() {
  return [
    ["health", "Vie"],
    ["stamina", "Énergie"],
    ["weight", "Poids"],
    ["melee", "Att"],
    ["food", "Nourriture"],
    ["oxygen", "Oxygène"]
  ];
}

function recapTextFromStatBlock(block) {
  if (!block) return "";
  const srcWild = block.bestWild || {};
  const srcTamed = block.bestTamed || {};
  const parts = [];
  for (const [k, label] of statOrderRecap()) {
    const v = srcWild[k];
    if (Number.isFinite(Number(v))) parts.push(`${label} ${Number(v)}`);
    else if (Number.isFinite(Number(srcTamed[k]))) parts.push(`${label} ${Number(srcTamed[k])}t`);
  }
  return parts.join(" · ");
}

function buildRecapStatGrid(title, sexKey, sexBlock) {
  if (!sexBlock || (!sexBlock.bestWild && !sexBlock.bestTamed)) return null;
  const srcWild = sexBlock.bestWild || {};
  const srcTamed = sexBlock.bestTamed || {};
  const values = [];

  for (const [k, label] of statOrderRecap()) {
    let val = null, suffix = "";
    if (Number.isFinite(Number(srcWild[k]))) {
      val = Number(srcWild[k]);
    } else if (Number.isFinite(Number(srcTamed[k]))) {
      val = Number(srcTamed[k]);
      suffix = "t";
    }
    if (val !== null) values.push({ label, val, suffix });
  }
  if (!values.length) return null;

  const block = document.createElement("div");
  block.className = "ocr-recap-sex";

  const head = document.createElement("div");
  head.className = "ocr-recap-head";

  const sex = document.createElement("span");
  sex.className = "sex";
  sex.textContent = sexKey === "m" ? "♂" : "♀";
  head.appendChild(sex);

  const count = document.createElement("span");
  count.className = "count";
  const c = Number(sexBlock.count || 0);
  count.textContent = `${c} scan${c > 1 ? "s" : ""}`;
  head.appendChild(count);

  const del = document.createElement("button");
  del.type = "button";
  del.className = "ocr-recap-clear";
  del.title = `Effacer les stats scannées (${sexKey === "m" ? "Mâle" : "Femelle"})`;
  del.setAttribute("aria-label", del.title);
  del.textContent = "✕";
  del.addEventListener("click", (e) => {
    e.preventDefault();
    e.stopPropagation();
    clearScanStatsForDino(title, sexKey);
  });
  head.appendChild(del);

  const grid = document.createElement("div");
  grid.className = "ocr-recap-grid";
  for (const item of values) {
    const cell = document.createElement("div");
    cell.className = "ocr-recap-cell";

    const kEl = document.createElement("span");
    kEl.className = "k";
    kEl.textContent = item.label;

    const vEl = document.createElement("span");
    vEl.className = "v";
    vEl.textContent = `${item.val}${item.suffix}`;

    cell.appendChild(kEl);
    cell.appendChild(vEl);
    grid.appendChild(cell);
  }

  block.appendChild(head);
  block.appendChild(grid);
  return block;
}

function buildStatsRecapElementForDino(title) {
  const data = getScanStatsForDino(title);
  if (!data) return null;
  const wrap = document.createElement("div");
  wrap.className = "ocr-recap";
  const mBlock = buildRecapStatGrid(title, "m", data.m);
  const fBlock = buildRecapStatGrid(title, "f", data.f);
  if (!mBlock && !fBlock) return null;
  if (mBlock) wrap.appendChild(mBlock);
  if (fBlock) wrap.appendChild(fBlock);
  return wrap;
}

function buildScanAliasIndex() {
  const entries = [];
  const seen = new Set();
  const add = (alias, title) => {
    const n = normalizeDinoKey(alias);
    if (!n || n.length < 3 || !title) return;
    const key = n + "||" + title;
    if (seen.has(key)) return;
    seen.add(key);
    entries.push({ aliasNorm: n, title });
  };

  for (const title of DINO_TITLES) {
    add(title, title);
    const noParen = String(title).replace(/\s*\([^)]*\)\s*/g, " ").trim();
    add(noParen, title);
    const m = String(title).match(/\(([^)]+)\)/);
    if (m && m[1]) add(m[1], title);
  }

  for (const [frKey, enName] of Object.entries(DINO_FR_TO_EN)) {
    const title = DINO_TITLES.find(t => normalizeDinoKey(t) === frKey) ||
                  DINO_TITLES.find(t => normalizeDinoKey(String(t).replace(/\s*\([^)]*\)\s*/g, " ").trim()) === frKey);
    if (title) add(enName, title);
  }

  // extras ARK terms / OCR variants
  [
    ["allosaurus", "Allosaure"],
    ["allo", "Allosaure"],
    ["managarmr", "Managarmr"],
    ["yiling", "Yi Ling"],
    ["yi ling", "Yi Ling"],
    ["icejumper", "Managarmr"],
  ].forEach(([a,t]) => add(a,t));

  entries.sort((a,b) => b.aliasNorm.length - a.aliasNorm.length);
  return entries;
}
const SCAN_ALIAS_INDEX = buildScanAliasIndex();

function findDinoFromOcrText(rawText) {
  const textNorm = normalizeDinoKey(rawText || "");
  if (!textNorm) return null;

  // 1) Try first line before Male/Female
  const firstLine = String(rawText || "").split(/\r?\n/).find(x => x.trim()) || "";
  const firstNorm = normalizeDinoKey(firstLine);
  if (firstNorm) {
    const m = firstLine.match(/^(.{2,80}?)\s+(Male|Female|Mafe|Femaie|Femal)\b/i);
    if (m && m[1]) {
      const candidateNorm = normalizeDinoKey(m[1]);
      for (const e of SCAN_ALIAS_INDEX) {
        if (candidateNorm === e.aliasNorm || candidateNorm.includes(e.aliasNorm) || e.aliasNorm.includes(candidateNorm)) return e.title;
      }
    }
  }

  // 2) Contains match over normalized full text (longest alias first)
  for (const e of SCAN_ALIAS_INDEX) {
    if (textNorm.includes(e.aliasNorm)) return e.title;
  }
  return null;
}

function detectSexFromOcrText(rawText) {
  const t = String(rawText || "");
  if (/\bFemale\b/i.test(t) || /\bFemaie\b/i.test(t) || /\bFemal\b/i.test(t)) return "f";
  // avoid matching "female" as male by testing female first
  if (/\bMale\b/i.test(t) || /\bMafe\b/i.test(t)) return "m";
  return null;
}

function parseStatPairsFromOcrText(rawText) {
  const full = String(rawText || "").replace(/\u00A0/g, " ");

  const buildEmpty = () => ({ wild:{}, tamed:{}, rawPairs:[] });

  // -------- Format 1: écran ARK "Wild Stat Points / Tamed Stat Points" (x / y) --------
  const anchorIdx = full.search(/Wild\s*Stat\s*Points/i);
  let zone = anchorIdx >= 0 ? full.slice(anchorIdx, anchorIdx + 1800) : full;
  const stopIdx = zone.search(/Cooldowns|Timers|Mating|Other Details/i);
  if (stopIdx > 0) zone = zone.slice(0, stopIdx);

  const pairs = [];
  const rePairs = /(\d{1,3})\s*\/\s*(\d{1,3})/g;
  let m;
  while ((m = rePairs.exec(zone)) !== null) {
    const wild = Number(m[1]), tamed = Number(m[2]);
    if (!Number.isFinite(wild) || !Number.isFinite(tamed)) continue;
    // garde uniquement les valeurs plausibles de points de stats (évite IDs / gros nombres)
    if (wild > 255 || tamed > 255) continue;
    // évite les faux positifs "0 / 0" (très fréquents en OCR sur d'autres écrans)
    if (wild === 0 && tamed === 0) continue;
    pairs.push([wild, tamed]);
    if (pairs.length >= 7) break;
  }

  const vanillaKeys = ["health","stamina","oxygen","food","weight","melee","speed"];
  const vanilla = { wild:{}, tamed:{}, rawPairs:pairs };
  pairs.forEach((p, idx) => {
    const k = vanillaKeys[idx];
    if (!k) return;
    vanilla.wild[k] = p[0];
    vanilla.tamed[k] = p[1];
  });

  const vanillaCount = Object.keys(vanilla.wild).length + Object.keys(vanilla.tamed).length;
  if (vanillaCount >= 4) return vanilla;

  // -------- Format 2: écran de stats "breeding overlay" (ex. Pyromane screenshot) --------
  // On récupère les lignes de type:
  // 150 0 0 18600/18600   (gauche: vie/stam/poids/oxy/food)
  // 150 10 0 878%         (droite: mêlée)
  const lines = full
    .split(/\r?\n/)
    .map(l => l.replace(/\u00A0/g, " ").trim())
    .filter(Boolean);

  const leftRows = [];
  const rightPctRows = [];
  const seenLeft = new Set();
  const seenRight = new Set();

  for (const line of lines) {
    const lm = line.match(/^(\d{1,3})\s+(\d{1,3})\s+(\d{1,3})\s+(\d{1,6})\s*\/\s*(\d{1,6})\b/);
    if (lm) {
      const a = Number(lm[1]); // valeur de stat à conserver (ex 150 / 120)
      const x = Number(lm[4]), y = Number(lm[5]);
      // Les barres de valeur (x/y) sont souvent >255 sur ce format -> bon indicateur
      if (Number.isFinite(a) && a >= 0 && a <= 255 && (x > 255 || y > 255)) {
        const key = line;
        if (!seenLeft.has(key)) {
          seenLeft.add(key);
          leftRows.push({ value: a, line });
        }
      }
    }

    const rm = line.match(/^(\d{1,3})\s+(\d{1,3})\s+(\d{1,3})\s+\d{1,4}\s*%/i);
    if (rm) {
      const a = Number(rm[1]); // valeur mêlée (1ère ligne du bloc de droite)
      if (Number.isFinite(a) && a >= 0 && a <= 255) {
        const key = line;
        if (!seenRight.has(key)) {
          seenRight.add(key);
          rightPctRows.push({ value: a, line });
        }
      }
    }
  }

  if (leftRows.length) {
    const out = buildEmpty();
    out.sourceFormat = "breeder";

    // Ordre attendu du panneau gauche (ASA overlay de breeding):
    // Vie, Énergie, Poids, Oxygène, Nourriture, ... (on ignore le reste)
    const leftMap = ["health","stamina","weight","oxygen","food"];
    leftRows.slice(0, leftMap.length).forEach((row, idx) => {
      const k = leftMap[idx];
      if (!k) return;
      out.wild[k] = row.value;
      out.rawPairs.push([row.value, 0]);
    });

    // Panneau droit : 1ère ligne en % = Attaque
    if (rightPctRows[0]) {
      out.wild.melee = rightPctRows[0].value;
      out.rawPairs.push([rightPctRows[0].value, 0]);
    }

    const breederCount = Object.keys(out.wild).length;
    if (breederCount >= 4) return out;
  }

  // rien de proprement exploitable
  return vanillaCount ? vanilla : buildEmpty();
}


// ===== OCR + extraction stats (overlay breeding) via crops =====
let __ocrWorkerDigits = null;

async function getDigitsWorker() {
  if (__ocrWorkerDigits) return __ocrWorkerDigits;
  if (!window.Tesseract || !window.Tesseract.createWorker) {
    await ensureTesseractLoaded();
  }
  const worker = await window.Tesseract.createWorker("eng");
  // whitelist chiffres uniquement pour améliorer la lecture
  await worker.setParameters({
    tessedit_char_whitelist: "0123456789",
    // 7 = SINGLE_LINE sur Tesseract classique; ici on laisse par défaut si non supporté
  });
  __ocrWorkerDigits = worker;
  return worker;
}

function preprocessForOcr(srcCanvas, { invert=true, threshold=155 } = {}) {
  const c = document.createElement("canvas");
  c.width = srcCanvas.width;
  c.height = srcCanvas.height;
  const ctx = c.getContext("2d", { willReadFrequently: true });
  ctx.drawImage(srcCanvas, 0, 0);
  const img = ctx.getImageData(0, 0, c.width, c.height);
  const d = img.data;

  // grayscale + threshold
  for (let i = 0; i < d.length; i += 4) {
    const r = d[i], g = d[i+1], b = d[i+2];
    const y = 0.2126*r + 0.7152*g + 0.0722*b;
    let v = y >= threshold ? 255 : 0;
    if (invert) v = 255 - v;
    d[i] = d[i+1] = d[i+2] = v;
    d[i+3] = 255;
  }
  ctx.putImageData(img, 0, 0);
  return c;
}

function preprocessYellowDigits(srcCanvas) {
  const c = document.createElement("canvas");
  c.width = srcCanvas.width;
  c.height = srcCanvas.height;
  const ctx = c.getContext("2d", { willReadFrequently: true });
  ctx.drawImage(srcCanvas, 0, 0);
  const img = ctx.getImageData(0, 0, c.width, c.height);
  const d = img.data;

  for (let i = 0; i < d.length; i += 4) {
    const r = d[i], g = d[i+1], b = d[i+2];
    // Isole les chiffres jaunes/orangés (points de stats ASA)
    const yellowish =
      r > 110 &&
      g > 85 &&
      b < 130 &&
      (r + g) > (b * 2 + 80) &&
      Math.abs(r - g) < 120;

    const v = yellowish ? 0 : 255; // chiffres noirs sur fond blanc
    d[i] = d[i+1] = d[i+2] = v;
    d[i+3] = 255;
  }

  ctx.putImageData(img, 0, 0);
  return c;
}

function cropToCanvas(imgEl, rect, scale=3) {
  const c = document.createElement("canvas");
  c.width = Math.max(1, Math.round(rect.w * scale));
  c.height = Math.max(1, Math.round(rect.h * scale));
  const ctx = c.getContext("2d", { willReadFrequently: true });
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(
    imgEl,
    rect.x, rect.y, rect.w, rect.h,
    0, 0, c.width, c.height
  );
  return c;
}

function parseFirstInt(text) {
  const m = String(text || "").match(/(\d{1,3})/);
  if (!m) return null;
  const n = Number(m[1]);
  return Number.isFinite(n) ? n : null;
}

async function ocrDigitsFromCrop(imgEl, rect) {
  const raw = cropToCanvas(imgEl, rect, 5);
  const worker = await getDigitsWorker();

  // On tente plusieurs prétraitements + versions élargies du crop
  const attempts = [];
  const pushAttempt = (canvas) => { if (canvas) attempts.push(canvas); };

  pushAttempt(preprocessYellowDigits(raw)); // prioritaire pour les chiffres jaunes ASA
  pushAttempt(preprocessForOcr(raw, { invert: true, threshold: 150 }));
  pushAttempt(preprocessForOcr(raw, { invert: true, threshold: 130 }));
  pushAttempt(preprocessForOcr(raw, { invert: false, threshold: 180 }));

  // léger élargissement horizontal (si le crop coupe un chiffre)
  const padRect = {
    x: Math.max(0, Math.round(rect.x - rect.w * 0.12)),
    y: Math.max(0, Math.round(rect.y - rect.h * 0.08)),
    w: Math.round(rect.w * 1.24),
    h: Math.round(rect.h * 1.16),
  };
  pushAttempt(preprocessYellowDigits(cropToCanvas(imgEl, padRect, 5)));

  let best = null;
  for (const canvas of attempts) {
    try {
      const { data } = await worker.recognize(canvas);
      const n = parseFirstInt(data?.text || "");
      if (n !== null && n >= 0 && n <= 255) {
        // On préfère les valeurs >0 si possible
        if (best === null) best = n;
        if (n > 0) return n;
      }
    } catch(_e) {}
  }
  return best;
}

async function extractBreederStatsFromImage(imgEl) {
  // Rectangles relatifs calibrés sur l'overlay breeding ASA (Pyromane / Managarmr-like)
  // On cible UNIQUEMENT les chiffres jaunes des points pour éviter les 0 rouges/verts et les valeurs 18600/4550 etc.
  const w = imgEl.naturalWidth || imgEl.width;
  const h = imgEl.naturalHeight || imgEl.height;

  const rect = (rx, ry, rw, rh) => ({
    x: Math.max(0, Math.round(rx * w)),
    y: Math.max(0, Math.round(ry * h)),
    w: Math.max(1, Math.round(rw * w)),
    h: Math.max(1, Math.round(rh * h)),
  });

  const stats = {};
  const keys = ["health","stamina","weight","oxygen","food"];

  // Profil principal (observé sur ton screenshot Pyromane 666x631)
  // chiffres jaunes colonne gauche ≈ x:[64..100], y:[139..338] (5 lignes)
  const leftX = 0.088;
  const leftW = 0.078;
  const rowH  = 0.052;
  const ys = [0.214, 0.287, 0.358, 0.430, 0.502];

  for (let i = 0; i < keys.length; i++) {
    const n = await ocrDigitsFromCrop(imgEl, rect(leftX, ys[i], leftW, rowH));
    if (n !== null && n >= 0 && n <= 255) stats[keys[i]] = n;
  }

  // Attaque (mêlée) = 1ère ligne de la colonne droite (valeur jaune "150" sur ton screen)
  const melee = await ocrDigitsFromCrop(imgEl, rect(0.665, 0.214, 0.078, rowH));
  if (melee !== null && melee >= 0 && melee <= 255) stats.melee = melee;

  // Petit plan B si une ou deux lignes sont ratées (décalage vertical)
  if (Object.keys(stats).length < 5) {
    const ysAlt = [0.219, 0.291, 0.363, 0.434, 0.506];
    for (let i = 0; i < keys.length; i++) {
      if (stats[keys[i]] !== undefined) continue;
      const n = await ocrDigitsFromCrop(imgEl, rect(0.090, ysAlt[i], 0.082, 0.055));
      if (n !== null && n >= 0 && n <= 255) stats[keys[i]] = n;
    }
    if (stats.melee === undefined) {
      const m2 = await ocrDigitsFromCrop(imgEl, rect(0.670, 0.219, 0.082, 0.055));
      if (m2 !== null && m2 >= 0 && m2 <= 255) stats.melee = m2;
    }
  }

  const count = Object.keys(stats).length;
  return count >= 3 ? stats : null;
}

function parseArkOcrText(rawText) {
  const text = String(rawText || "").replace(/\u00A0/g, " ").trim();
  const dinoTitle = findDinoFromOcrText(text);
  const sex = detectSexFromOcrText(text);
  const stats = parseStatPairsFromOcrText(text);
  return { text, dinoTitle, sex, stats };
}

async function ensureTesseractLoaded() {
  if (window.Tesseract && typeof window.Tesseract.recognize === "function") return true;
  // script tag already present; wait a bit if still loading
  for (let i=0;i<30;i++) {
    await new Promise(r => setTimeout(r, 200));
    if (window.Tesseract && typeof window.Tesseract.recognize === "function") return true;
  }
  throw new Error("Tesseract.js indisponible");
}

function escapeHtml(s) {
  return String(s ?? "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}



function resolveManualDinoTitle(input) {
  const raw = String(input || "").trim();
  if (!raw) return "";
  const exact = DINO_TITLES.find(t => t === raw);
  if (exact) return exact;

  const n = normalizeDinoKey(raw);
  if (!n) return raw;

  for (const t of DINO_TITLES) {
    if (normalizeDinoKey(t) === n) return t;
    const noParen = String(t).replace(/\s*\([^)]*\)\s*/g, " ").trim();
    if (normalizeDinoKey(noParen) === n) return t;
  }

  for (const e of (SCAN_ALIAS_INDEX || [])) {
    if (e.aliasNorm === n) return e.title;
  }
  for (const e of (SCAN_ALIAS_INDEX || [])) {
    if (n.includes(e.aliasNorm) || e.aliasNorm.includes(n)) return e.title;
  }
  return raw;
}

function scanManualStatPrefill(parsed, key) {
  const w = parsed?.stats?.wild || {};
  const t = parsed?.stats?.tamed || {};
  if (Number.isFinite(Number(w[key]))) return Number(w[key]);
  if (Number.isFinite(Number(t[key]))) return Number(t[key]);
  return "";
}

function buildScanManualCorrectionForm(parsed, sourceLabel="scan") {
  const dinoOptions = (Array.isArray(DINO_TITLES) ? DINO_TITLES : [])
    .map(t => `<option value="${escapeHtml(t)}"></option>`)
    .join("");

  const dinoVal = escapeHtml(parsed?.dinoTitle || "");
  const sexVal = parsed?.sex === "f" ? "f" : (parsed?.sex === "m" ? "m" : "");
  const selected = (v) => sexVal === v ? " selected" : "";

  const statFields = [
    ["health", "Vie"],
    ["stamina", "Énergie"],
    ["weight", "Poids"],
    ["melee", "Attaque"],
    ["food", "Nourriture"],
    ["oxygen", "Oxygène"]
  ];

  const statInputs = statFields.map(([key, label]) => `
    <div class="mrow">
      <label for="scanManual_${key}">${label}</label>
      <input id="scanManual_${key}" data-stat-key="${key}" type="number" inputmode="numeric" min="0" max="255" step="1" value="${escapeHtml(scanManualStatPrefill(parsed, key))}" placeholder="ex: 77" />
    </div>
  `).join("");

  return `
    <div class="scan-manual-edit" id="scanManualEdit" data-source-label="${escapeHtml(sourceLabel)}">
      <div class="mh">Correction manuelle (si l'OCR se trompe) ✍️</div>
      <div class="msub">Corrige l'espèce, le sexe et/ou les stats jaunes, puis clique <b>Appliquer correction</b>. Le calcul “utile / pas utile” sera refait avant validation.</div>
      <div class="mgrid">
        <div class="mrow">
          <label for="scanManual_dino">Espèce</label>
          <input id="scanManual_dino" type="text" list="scanManual_dino_list" value="${dinoVal}" placeholder="ex: Allosaure" />
          <datalist id="scanManual_dino_list">${dinoOptions}</datalist>
        </div>
        <div class="mrow">
          <label for="scanManual_sex">Sexe</label>
          <select id="scanManual_sex">
            <option value=""${selected("")}>— Choisir —</option>
            <option value="m"${selected("m")}>Mâle</option>
            <option value="f"${selected("f")}>Femelle</option>
          </select>
        </div>
      </div>

      <div class="mstats">
        ${statInputs}
      </div>

      <div class="mactions">
        <button type="button" id="scanManualApplyBtn">Appliquer correction</button>
        <button type="button" id="scanManualClearStatsBtn" class="secondary" title="Vide les champs stats">Vider champs stats</button>
        <span class="hint">Rien n'est ajouté en base tant que tu n'as pas cliqué sur <b>✅ Valider</b>.</span>
      </div>
    </div>
  `;
}

function bindScanManualCorrectionForm(defaultParsed, sourceLabel="scan") {
  const box = document.getElementById("scanManualEdit");
  if (!box || box.dataset.bound === "1") return;
  box.dataset.bound = "1";

  const q = (id) => document.getElementById(id);
  const btnApply = q("scanManualApplyBtn");
  const btnClearStats = q("scanManualClearStatsBtn");

  btnClearStats?.addEventListener("click", () => {
    box.querySelectorAll('input[data-stat-key]').forEach(inp => { inp.value = ""; });
  });

  btnApply?.addEventListener("click", async () => {
    try {
      const rawDino = (q("scanManual_dino")?.value || "").trim();
      const dinoTitle = resolveManualDinoTitle(rawDino);
      const sex = (q("scanManual_sex")?.value || "").trim();

      const wild = {};
      const rawPairs = [];
      box.querySelectorAll('input[data-stat-key]').forEach(inp => {
        const k = inp.getAttribute("data-stat-key");
        const v = String(inp.value || "").trim();
        if (!k || v === "") return;
        const n = Number(v);
        if (!Number.isFinite(n)) return;
        const safe = Math.max(0, Math.min(255, Math.round(n)));
        wild[k] = safe;
        rawPairs.push([safe, 0]);
      });

      const manualParsed = {
        text: defaultParsed?.text || "",
        dinoTitle,
        sex: (sex === "m" || sex === "f") ? sex : null,
        stats: { wild, tamed: {}, rawPairs, sourceFormat: "manual-fix" }
      };

      setScanStatus("Correction manuelle : recalcul en cours…");
      const ok = await applyParsedScan(manualParsed, `correction manuelle (${sourceLabel})`);
      setScanStatus(ok
        ? "Correction appliquée ✅ · Vérifie puis clique sur Valider pour écrire en base"
        : "Correction manuelle incomplète ⚠️");
    } catch (e) {
      console.error(e);
      setScanStatus("Erreur correction manuelle ❌");
    }
  });
}


function renderPendingScanValidation(parsed, sourceLabel, resultRows) {
  __scanPending = { parsed, sourceLabel };
  const actionHtml = `
    <div class="row" style="margin-top:10px;padding-top:10px;border-top:1px dashed rgba(255,255,255,.2)">
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
        <button id="scanConfirmBtn" type="button" style="background:#16a34a;color:#fff;border:none;border-radius:10px;padding:10px 14px;font-weight:800;cursor:pointer;">✅ Valider</button>
        <button id="scanCancelBtn" type="button" style="background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.18);border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer;">Annuler</button>
        <span style="opacity:.9;">Aucune donnée n'est ajoutée à la base tant que tu n'as pas cliqué sur <b>Valider</b>.</span>
      </div>
    </div>`;
  setScanPreview("", resultRows.join("") + actionHtml + buildScanManualCorrectionForm(parsed, sourceLabel));
  bindScanManualCorrectionForm(parsed, sourceLabel);

  const confirmBtn = document.getElementById("scanConfirmBtn");
  const cancelBtn = document.getElementById("scanCancelBtn");

  if (confirmBtn) {
    confirmBtn.addEventListener("click", async () => {
      if (!__scanPending) return;
      confirmBtn.disabled = true;
      confirmBtn.textContent = "Validation…";
      try {
        await commitPendingParsedScan();
      } finally {
        if (document.getElementById("scanConfirmBtn")) {
          const b = document.getElementById("scanConfirmBtn");
          b.disabled = false;
          b.textContent = "✅ Valider";
        }
      }
    }, { once: true });
  }

  if (cancelBtn) {
    cancelBtn.addEventListener("click", () => {
      __scanPending = null;
      setScanStatus("Ajout annulé.");
      setScanPreview("", `<div class="row warn">Ajout annulé. Tu peux rescanner ou corriger manuellement.</div>` + buildScanManualCorrectionForm(parsed, sourceLabel));
      bindScanManualCorrectionForm(parsed, sourceLabel);
    }, { once: true });
  }

  setScanStatus("OCR terminé ✅ · Clique sur Valider pour ajouter à la base");
}

async function commitPendingParsedScan() {
  if (!__scanPending || !__scanPending.parsed) return false;
  const { parsed, sourceLabel } = __scanPending;
  __scanPending = null;

  const resultRows = [];
  resultRows.push(`<div class="row ok">Espèce détectée : <b>${escapeHtml(parsed.dinoTitle)}</b> ✅</div>`);
  resultRows.push(`<div class="row ok">Sexe détecté : <b>${parsed.sex === "m" ? "Mâle" : "Femelle"}</b> ✅</div>`);
  const statPairsCount = parsed?.stats?.rawPairs?.length || 0;
  resultRows.push(`<div class="row ${statPairsCount ? "ok" : "warn"}">Stats détectées : <b>${statPairsCount}</b> pair(s) ${statPairsCount ? "✅" : "⚠️"}</div>`);

  // coche auto (au moment de la validation seulement)
  state[parsed.dinoTitle] = state[parsed.dinoTitle] || {m:false, f:false};
  if (!state[parsed.dinoTitle][parsed.sex]) {
    state[parsed.dinoTitle][parsed.sex] = true;
    resultRows.push(`<div class="row ok">Case cochée automatiquement : <b>${escapeHtml(parsed.dinoTitle)} / ${parsed.sex === "m" ? "Mâle" : "Femelle"}</b> ✅</div>`);
  } else {
    resultRows.push(`<div class="row warn">Case déjà cochée : <b>${escapeHtml(parsed.dinoTitle)} / ${parsed.sex === "m" ? "Mâle" : "Femelle"}</b></div>`);
  }

  // stats
  upsertScanStats(parsed.dinoTitle, parsed.sex, parsed);
  const slot = getScanStatsForDino(parsed.dinoTitle)?.[parsed.sex];
  const recap = recapTextFromStatBlock(slot);
  if (recap) {
    resultRows.push(`<div class="row ok">Récap ${parsed.sex === "m" ? "♂" : "♀"} : ${escapeHtml(recap)}</div>`);
  }

  maybeRecordProgressSnapshot();
  saveState();
  render();
  if (window.__saveToFirebase) {
    try { await window.__saveToFirebase(); } catch(_e) {}
  }

  resultRows.push(`<div class="row">Source : ${escapeHtml(sourceLabel)}</div>`);
  resultRows.push(`<div class="row ok">Ajout validé ✅</div>`);
  setScanPreview("", resultRows.join(""));
  setScanStatus("Ajout en base terminé ✅");
  return true;
}


function ocrComparableStatsFromParsed(parsed) {
  // Comparaison stricte = uniquement les points jaunes (wild stat points), pas les valeurs tamed.
  const src = parsed?.stats?.wild || {};
  const out = {};
  for (const [key] of statOrderRecap()) {
    const n = Number(src?.[key]);
    if (Number.isFinite(n)) out[key] = Math.round(n);
  }
  return out;
}

function ocrComparableSummary(parsed) {
  const chunks = [];
  if (parsed?.dinoTitle) chunks.push(String(parsed.dinoTitle));
  if (parsed?.sex) chunks.push(parsed.sex === "m" ? "Mâle" : "Femelle");
  const stats = ocrComparableStatsFromParsed(parsed);
  const statParts = [];
  for (const [key, label] of statOrderRecap()) {
    if (Number.isFinite(stats[key])) statParts.push(`${label} ${stats[key]}`);
  }
  if (statParts.length) chunks.push(statParts.join(" · "));
  return chunks.join(" · ") || "Aucune donnée exploitable";
}

function compareDualOcrParsed(parsedA, parsedB) {
  const aStats = ocrComparableStatsFromParsed(parsedA);
  const bStats = ocrComparableStatsFromParsed(parsedB);

  const normTitle = (v) => String(v || "").trim().normalize("NFC");
  const normSex = (v) => (v === "m" || v === "f") ? v : "";

  // Signature stricte : espèce + sexe + seules stats jaunes (dans l'ordre fixe des 6 stats).
  // On encode les 6 clés explicitement pour éviter tout faux positif lié aux clés manquantes / ordre JSON.
  const orderedStatsSig = (statsObj) => statOrderRecap().map(([k]) => {
    const v = Number(statsObj?.[k]);
    return Number.isFinite(v) ? String(Math.round(v)) : "";
  }).join("|");

  const a = {
    dinoTitle: normTitle(parsedA?.dinoTitle),
    sex: normSex(parsedA?.sex),
    stats: aStats
  };
  const b = {
    dinoTitle: normTitle(parsedB?.dinoTitle),
    sex: normSex(parsedB?.sex),
    stats: bStats
  };

  const sigA = `${a.dinoTitle}||${a.sex}||${orderedStatsSig(a.stats)}`;
  const sigB = `${b.dinoTitle}||${b.sex}||${orderedStatsSig(b.stats)}`;

  return {
    identical: sigA === sigB,
    a, b,
    signatureA: sigA,
    signatureB: sigB,
    summaryA: ocrComparableSummary(parsedA),
    summaryB: ocrComparableSummary(parsedB)
  };
}

function buildSecondTextOcrCanvas(imgEl) {
  const iw = imgEl.naturalWidth || imgEl.width || 1;
  const ih = imgEl.naturalHeight || imgEl.height || 1;
  const maxDim = Math.max(iw, ih);
  const scale = maxDim < 1200 ? 2 : (maxDim < 2200 ? 1.5 : 1);
  const c = document.createElement("canvas");
  c.width = Math.max(1, Math.round(iw * scale));
  c.height = Math.max(1, Math.round(ih * scale));
  const ctx = c.getContext("2d", { willReadFrequently: true });
  ctx.imageSmoothingEnabled = false;
  try { ctx.filter = "contrast(180%) saturate(140%) brightness(110%)"; } catch(_e) {}
  ctx.drawImage(imgEl, 0, 0, c.width, c.height);

  const img = ctx.getImageData(0, 0, c.width, c.height);
  const d = img.data;
  for (let i = 0; i < d.length; i += 4) {
    let r = d[i], g = d[i+1], b = d[i+2];
    const lum = 0.2126*r + 0.7152*g + 0.0722*b;
    const bluish = b > r + 10 && b > g;
    const yellowish = (r > 110 && g > 90 && b < 140 && (r + g) > (b * 2 + 60));
    if (lum > 120 || bluish || yellowish) {
      r = Math.min(255, r * 1.15 + 10);
      g = Math.min(255, g * 1.15 + 10);
      b = Math.min(255, b * 1.15 + 10);
    } else {
      r *= 0.82; g *= 0.82; b *= 0.82;
    }
    d[i] = r; d[i+1] = g; d[i+2] = b;
  }
  ctx.putImageData(img, 0, 0);
  return c;
}

async function applyParsedScan(parsed, sourceLabel="scan") {
  const resultRows = [];
  if (!parsed?.dinoTitle) resultRows.push(`<div class="row err">Espèce non détectée ❌</div>`);
  else resultRows.push(`<div class="row ok">Espèce détectée : <b>${escapeHtml(parsed.dinoTitle)}</b> ✅</div>`);

  if (!parsed?.sex) resultRows.push(`<div class="row err">Sexe non détecté ❌</div>`);
  else resultRows.push(`<div class="row ok">Sexe détecté : <b>${parsed.sex === "m" ? "Mâle" : "Femelle"}</b> ✅</div>`);

  const statPairsCount = parsed?.stats?.rawPairs?.length || 0;
  resultRows.push(`<div class="row ${statPairsCount ? "ok" : "warn"}">Stats détectées : <b>${statPairsCount}</b> pair(s) ${statPairsCount ? "✅" : "⚠️"}</div>`);

  if (parsed?.__ocrCompare) {
    const cmp = parsed.__ocrCompare;
    const cmpStyle = cmp.identical
      ? "background:#eafaf0;border:1px solid #86efac;color:#166534;padding:8px 10px;border-radius:10px;font-weight:800;"
      : "background:#fef2f2;border:1px solid #fca5a5;color:#991b1b;padding:8px 10px;border-radius:10px;font-weight:800;";
    resultRows.push(`<div class="row" style="${cmpStyle}">Double vérif OCR (A/B) : ${cmp.identical ? "VERT · IDENTIQUE ✅" : "ROUGE · DIFFÉRENT ❌"}</div>`);
    resultRows.push(`<div class="row ${cmp.identical ? "ok" : "err"}">Comparaison stricte = espèce + sexe + stats jaunes uniquement.</div>`);
    if (cmp.identical) {
      resultRows.push(`<div class="row ok">OCR A/B (espèce+sexe+stats jaunes) : ${escapeHtml(cmp.summaryA)}</div>`);
    } else {
      resultRows.push(`<div class="row err">OCR A : ${escapeHtml(cmp.summaryA)}</div>`);
      resultRows.push(`<div class="row err">OCR B : ${escapeHtml(cmp.summaryB)}</div>`);
    }
  }

  if (!parsed?.dinoTitle || !parsed?.sex) {
    __scanPending = null;
    const htmlMissing = resultRows.join("") + `<div class="row warn">Astuce : recadre le nom + sexe + zone des stats.</div>` + buildScanManualCorrectionForm(parsed, sourceLabel);
    setScanPreview("", htmlMissing);
    bindScanManualCorrectionForm(parsed, sourceLabel);
    return false;
  }

  // Aperçu d'impact (sans rien écrire tant que l'utilisateur n'a pas validé)
  const existing = getScanStatsForDino(parsed.dinoTitle)?.[parsed.sex];
  const incomingStats = parsed?.stats?.wild || parsed?.stats?.tamed || {};
  const improved = [];
  const unchanged = [];
  for (const [k, label] of statOrderRecap()) {
    const newVal = Number(incomingStats[k]);
    if (!Number.isFinite(newVal)) continue;
    const oldVal = Number(existing?.bestWild?.[k]);
    if (Number.isFinite(oldVal)) {
      if (newVal > oldVal) improved.push(`${label} ${oldVal}→${newVal}`);
      else unchanged.push(`${label} ${oldVal} (scan ${newVal})`);
    } else {
      improved.push(`${label} ∅→${newVal}`);
    }
  }
  if (improved.length) {
    resultRows.push(`<div class="row ok">Amélioration détectée : <b>${escapeHtml(improved.join(" · "))}</b></div>`);
  } else {
    resultRows.push(`<div class="row warn">Aucune amélioration de stats détectée (scan peut être doublon/moins bon).</div>`);
  }

  if (unchanged.length) {
    resultRows.push(`<div class="row">Comparaison : ${escapeHtml(unchanged.slice(0,4).join(" · "))}${unchanged.length > 4 ? " …" : ""}</div>`);
  }

  resultRows.push(`<div class="row">Source : ${escapeHtml(sourceLabel)}</div>`);
  renderPendingScanValidation(parsed, sourceLabel, resultRows);
  return null;
}

async function ocrImageFileAndApply(file) {
  if (!file) return;
  if (__scanBusy) return;
  __scanBusy = true;
  try {
    const dataUrl = await new Promise((resolve, reject) => {
      const fr = new FileReader();
      fr.onload = () => resolve(fr.result);
      fr.onerror = () => reject(fr.error || new Error("Lecture image impossible"));
      fr.readAsDataURL(file);
    });
    setScanPreview(dataUrl, `<div class="row">Image chargée : <b>${escapeHtml(file.name || "capture")}</b></div>`);
    const img = new Image();
    img.src = dataUrl;
    await new Promise((res, rej) => { img.onload = () => res(); img.onerror = rej; });

    setScanStatus("OCR: chargement moteur…");
    await ensureTesseractLoaded();

    // OCR A (standard)
    setScanStatus("OCR A: analyse en cours…");
    const resultA = await window.Tesseract.recognize(file, "eng", {
      logger: (m) => {
        if (!m) return;
        if (m.status) {
          const pct = Number.isFinite(m.progress) ? ` ${Math.round(m.progress * 100)}%` : "";
          setScanStatus(`OCR A: ${m.status}${pct}`);
        }
      }
    });
    const textA = resultA?.data?.text || "";
    const parsedA = parseArkOcrText(textA);

    // OCR B (2e passe de contrôle avec prétraitement différent)
    let parsedB = { text:"", dinoTitle:"", sex:"", stats:{ wild:{}, tamed:{}, rawPairs:[] } };
    try {
      setScanStatus("OCR B: contrôle croisé…");
      const altCanvas = buildSecondTextOcrCanvas(img);
      const resultB = await window.Tesseract.recognize(altCanvas, "eng");
      const textB = resultB?.data?.text || "";
      parsedB = parseArkOcrText(textB);
    } catch(_e) {
      // laisse parsedB vide => comparaison rouge si A et B diffèrent
    }

    const parsed = parsedA;
    parsed.__ocrCompare = compareDualOcrParsed(parsedA, parsedB);

    // Fallback: si l'OCR texte n'a pas sorti les stats, on tente un OCR ciblé par zones (overlay breeding)
    try {
      const extra = await extractBreederStatsFromImage(img);
      if (extra) {
        parsed.stats = parsed.stats || { wild:{}, tamed:{}, rawPairs:[] };
        parsed.stats.wild = parsed.stats.wild || {};
        parsed.stats.rawPairs = Array.isArray(parsed.stats.rawPairs) ? parsed.stats.rawPairs : [];
        Object.assign(parsed.stats.wild, extra);

        // Ajoute des pseudo-pairs pour l'affichage "Stats détectées" si l'OCR texte a raté les lignes
        const existing = new Set(
          parsed.stats.rawPairs
            .map(p => Array.isArray(p) ? `${Number(p[0])}|${Number(p[1])}` : "")
            .filter(Boolean)
        );
        for (const v of Object.values(extra)) {
          const key = `${Number(v)}|0`;
          if (Number.isFinite(Number(v)) && !existing.has(key)) {
            parsed.stats.rawPairs.push([Number(v), 0]);
            existing.add(key);
          }
        }

        parsed.stats.sourceFormat = "breeder-crop";
      }
    } catch(e) {
      // ignore
    }
    const previewTextA = escapeHtml(textA).slice(0, 900).replace(/\n/g,"<br>");
    const cmpBadge = parsed.__ocrCompare?.identical
      ? '<span style="display:inline-block;margin-left:8px;padding:2px 8px;border-radius:999px;background:#eafaf0;color:#166534;font-weight:800;border:1px solid #86efac;">A/B identique ✅</span>'
      : '<span style="display:inline-block;margin-left:8px;padding:2px 8px;border-radius:999px;background:#fef2f2;color:#991b1b;font-weight:800;border:1px solid #fca5a5;">A/B différent ❌</span>';
    setScanPreview(
      dataUrl,
      `<div class="row">Double vérif OCR : ${cmpBadge}<br>Texte OCR détecté (A)</div>` +
      `<div class="row" style="max-height:180px;overflow:auto;background:#fff;border:1px solid rgba(0,0,0,.08);padding:8px;border-radius:8px;">${previewTextA || "<i>vide</i>"}</div>`
    );
    await applyParsedScan(parsed, file.name || "image");
    setScanStatus(parsed.__ocrCompare?.identical ? "OCR A+B terminés ✅ (vert)" : "OCR A+B terminés ✅ (rouge)");
  } catch (e) {
    console.error(e);
    setScanStatus("OCR erreur ❌");
    setScanPreview("", `<div class="row err">Erreur OCR : ${escapeHtml(e?.message || e)}</div>`);
  } finally {
    __scanBusy = false;
  }
}

  }

function setupScanUi() {
  if (__scanUiInit) return;
  __scanUiInit = true;
  const els = scanUiEls();
  if (!els.panel) return;

  const openClose = (forceOpen=null) => {
    const shouldOpen = forceOpen === null ? !els.panel.classList.contains("open") : !!forceOpen;
    els.panel.classList.toggle("open", shouldOpen);
    if (shouldOpen) setScanStatus("Prêt ✅");
  };

  els.btn?.addEventListener("click", () => openClose());
  els.closeBtn?.addEventListener("click", () => openClose(false));
  els.pickBtn?.addEventListener("click", () => els.fileInput?.click());
  els.fileInput?.addEventListener("change", (e) => {
    const f = e.target.files && e.target.files[0];
    if (f) { openClose(true); ocrImageFileAndApply(f); }
    e.target.value = "";
  });
  els.processTextBtn?.addEventListener("click", async () => {
    openClose(true);
    await parsePastedTextAndApply();
  });

  const dz = els.dropZone;
  if (dz) {
    ["dragenter","dragover"].forEach(evt => dz.addEventListener(evt, (e) => {
      e.preventDefault(); e.stopPropagation(); dz.classList.add("dragover");
    }));
    ["dragleave","drop"].forEach(evt => dz.addEventListener(evt, (e) => {
      e.preventDefault(); e.stopPropagation(); dz.classList.remove("dragover");
    }));
    dz.addEventListener("drop", (e) => {
      openClose(true);
      const files = [...(e.dataTransfer?.files || [])];
      const img = files.find(f => (f.type || "").startsWith("image/"));
      if (img) ocrImageFileAndApply(img);
      else setScanStatus("Aucune image détectée dans le dépôt.");
    });

    dz.addEventListener("paste", (e) => {
      openClose(true);
      const items = [...(e.clipboardData?.items || [])];
      const imgItem = items.find(it => it.type && it.type.startsWith("image/"));
      if (imgItem) {
        const blob = imgItem.getAsFile();
        if (blob) {
          const f = new File([blob], "capture-paste.png", { type: blob.type || "image/png" });
          ocrImageFileAndApply(f);
          e.preventDefault();
          return;
        }
      }
      const txt = e.clipboardData?.getData("text/plain");
      if (txt && els.pasteText) {
        els.pasteText.value = txt;
        setScanStatus("Texte collé détecté. Clique “Parser texte collé”.");
      }
    });

    dz.addEventListener("click", () => els.fileInput?.click());
  }
}


function fandomFilePath(name) {
  const file = (name || "").trim().replace(/\s+/g, "_");
  return "https://ark.fandom.com/wiki/Special:FilePath/" + encodeURIComponent(file) + ".png";
}
function wikiFilePath(name) {
  const file = (name || "").trim().replace(/\s+/g, "_");
  return "https://ark.wiki.gg/wiki/Special:FilePath/" + encodeURIComponent(file) + ".png";
}

function iconCandidates(t) {
  const out = [];
  const add = (v) => {
    if (!v) return;
    v = String(v).trim();
    if (v && !out.includes(v)) out.push(v);
  };

  add(t);

  const m = t.match(/\(([^)]+)\)/);
  if (m && m[1]) add(m[1]);

  const noParen = t.replace(/\s*\([^)]*\)\s*/g, " ").trim();
  add(noParen);

  const noTek = noParen.replace(/\s+TEK$/i, "").trim();
  add(noTek);

  // Saison -> Drakeling générique (wiki/Fandom utilisent souvent le fichier de base)
  if (/^Drakeling\s+/i.test(noTek)) add("Drakeling");

  // Mapping FR -> EN sur tous les candidats déjà connus
  [...out].forEach(c => {
    const mapped = DINO_FR_TO_EN[normalizeDinoKey(c)];
    if (mapped) add(mapped);
  });

  // Yi Ling : plusieurs variantes de noms de fichier possibles
  if (/^Yi\s*Ling$/i.test(noTek) || normalizeDinoKey(noTek) === "yiling") {
    [
      "Yi Ling", "Yi_Ling", "YiLing", "Yi-Ling",
      "Yi Ling (ASA)", "Yi Ling (Creature)", "Yi Ling Creature"
    ].forEach(add);
  }

  // FallBack wyvernes introuvables -> icônes de wyvernes classiques cohérentes
  const norm = normalizeDinoKey(noTek);
  if (norm === "wyvernerunique") {
    ["Lightning Wyvern", "Fire Wyvern", "Poison Wyvern", "Ice Wyvern", "Wyvern"].forEach(add);
  }
  if (norm === "wyvernesaphir") {
    ["Ice Wyvern", "Lightning Wyvern", "Wyvern"].forEach(add);
  }
  if (norm === "wyvernevenin") {
    ["Poison Wyvern", "Fire Wyvern", "Wyvern"].forEach(add);
  }

  return out;
}

function card(t) {
  const d = document.createElement("div");
  d.className = "card" + (isTamed(t) ? " tamed" : "");

  const top = document.createElement("div");
  top.className = "top";

  const icon = document.createElement("div");
  icon.className = "icon";

  const img = document.createElement("img");
  img.alt = t;
  img.loading = "lazy";

  const candidates = iconCandidates(t);
  let sourceIndex = 0; // 0 = fandom, 1 = wiki.gg
  let candidateIndex = 0;

  function nextUrl() {
    if (sourceIndex === 0) return fandomFilePath(candidates[candidateIndex]);
    if (sourceIndex === 1) return wikiFilePath(candidates[candidateIndex]);
    return null;
  }

  img.onerror = () => {
    candidateIndex++;
    if (candidateIndex >= candidates.length) {
      candidateIndex = 0;
      sourceIndex++;
    }
    const url = nextUrl();
    if (url) {
      img.src = url;
    } else {
      __missingIcons.add(t);
      icon.textContent = "🦖";
    }
  };

  const firstUrl = nextUrl();
  if (firstUrl) img.src = firstUrl;
  else icon.textContent = "🦖";

  icon.appendChild(img);

  const name = document.createElement("div");
  name.className = "name";
  name.textContent = t;

  top.appendChild(icon);
  top.appendChild(name);

  const checks = document.createElement("div");
  checks.className = "checks";

  ["m","f"].forEach(s => {
    const l = document.createElement("label");
    l.className = "chk";
    const i = document.createElement("input");
    i.type = "checkbox";
    i.checked = !!(state[t] && state[t][s]);
    i.onchange = e => toggle(t, s, e.target.checked);
    l.appendChild(i);
    l.appendChild(document.createTextNode(s === "m" ? "Mâle" : "Femelle"));
    checks.appendChild(l);
  });

  d.appendChild(top);

  const recap = buildStatsRecapElementForDino(t);
  if (recap) d.appendChild(recap);

  d.appendChild(checks);
  return d;
}

function exportJson() {

  const url = URL.createObjectURL(blob);

  a.href = url; a.download = "crocs-mignons-export.json";

function renderDinos() {
  const grid = document.getElementById("grid");
  const search = (document.getElementById("search").value || "").toLowerCase().trim();
  grid.innerHTML = "";
  let tamedCount = 0, shown = 0;

  DINO_TITLES_SORTED.forEach(t => {
    if (search && !t.toLowerCase().includes(search)) return;
    grid.appendChild(card(t));
    shown++;
    if (isTamed(t)) tamedCount++;
  });

  document.getElementById("statsText").innerText = tamedCount + " / " + DINO_TITLES.length + " dinos tamés";
  document.getElementById("shownText").innerText = "Affichés: " + shown;
  const prog = document.getElementById("prog");

import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

const firebaseConfig = {

};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app, firebaseConfig.databaseURL);
const SYNC_PATH = "crocsMignons/state_v3";

const syncText = document.getElementById("syncText");
function setSync(msg){ if(syncText) syncText.textContent = msg; }

// Ajout bouton déconnexion sans toucher à la logique checklist/icônes
(function addLogoutButton(){
  const controls = document.querySelector(".controls");
  if (!controls || document.getElementById("logoutBtn")) return;
  const btn = document.createElement("button");
  btn.id = "logoutBtn";
  btn.textContent = "Déconnexion";
  btn.style.background = "#c62828";
  btn.addEventListener("click", async () => {
    try { await signOut(auth); } catch(e) { console.error(e); }
    window.location.href = "./index.html";
  });
  controls.appendChild(btn);
})();

// Empêche boucle : quand Firebase met à jour, on ne renvoie pas tout de suite
let applyingRemote = false;
let syncStarted = false;
let remoteUnsub = null;

// Tant que l'utilisateur n'est pas connecté
window.__saveToFirebase = async function() {
  setSync("Sync: connexion requise 🔒");
};

function startRealtimeSync() {
  if (syncStarted) return;
  syncStarted = true;

  window.__saveToFirebase = async function(force=false){
    if (applyingRemote && !force) return;
    try {
      setSync("Sync: envoi…");
      await set(ref(db, SYNC_PATH), state);
      setSync("Sync: ok ✅");
    } catch(e) {
      console.error(e);
      setSync("Sync: erreur ❌");
    }
  };

  remoteUnsub = onValue(ref(db, SYNC_PATH), (snapshot) => {
    const data = snapshot.val();
    if (!data) {
      setSync("Sync: vide (init) ⏳");
      return;
    }
    applyingRemote = true;
    state = data;
    ensureProgressHistorySeed();
    localStorage.setItem("crocs_mignons_state_v3", JSON.stringify(state));
    render();
    applyingRemote = false;
    setSync("Sync: reçu ✅");
  });
}

onAuthStateChanged(auth, (user) => {
  if (!user) {
    setSync("Sync: connexion requise 🔒");
    if (remoteUnsub) {
      try { remoteUnsub(); } catch(_e) {}
      remoteUnsub = null;
      syncStarted = false;
    }
    setTimeout(() => {
      if (!auth.currentUser) window.location.href = "./index.html";
    }, 120);
    return;
  }

  startRealtimeSync();
  setSync("Sync: connecté ✅");
});
</script>
