<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Connexion - Crocs Mignons</title>
  <style>
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background: url("./fond.png") no-repeat center center fixed;
      background-size: cover;
    }
    .box{
      width:340px;
      background: rgba(0,0,0,0.72);
      color:#fff;
      padding:28px;
      border-radius:18px;
      text-align:center;
      box-shadow:0 10px 30px rgba(0,0,0,.45);
      backdrop-filter: blur(2px);
    }
    h1{ margin:0 0 14px; font-size:22px; }
    .sub{ opacity:.9; font-size:14px; margin-bottom:14px; }
    input{
      width:100%;
      padding:12px;
      border:0;
      border-radius:10px;
      font-size:16px;
      margin:10px 0 12px;
      outline:none;
    }
    button{
      width:100%;
      padding:12px;
      border:0;
      border-radius:10px;
      background:#4caf50;
      color:white;
      font-weight:800;
      cursor:pointer;
      font-size:16px;
    }
    button:hover{ background:#2e7d32; }
    .err{ color:#ff8080; min-height:18px; margin-top:10px; font-size:14px; }
    .hint{ margin-top:10px; font-size:12px; opacity:.85; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Accès Crocs Mignons 🦖</h1>
    <div class="sub">Entre le mot de passe pour accéder à la checklist</div>
    <input id="pw" type="password" placeholder="Mot de passe" />
    <button id="btn">Entrer</button>
    <div class="err" id="err"></div>
    <div class="hint">Elcamp + Nanika + Janifeal</div>
  </div>

  <script>
    const PASS = "Elcjanika17!";
    function go(){
      const v = document.getElementById("pw").value;
      if(v === PASS){
        window.location.href = "./checklist.html";
      }else{
        document.getElementById("err").textContent = "Mot de passe incorrect";
      }
    }
    document.getElementById("btn").addEventListener("click", go);
    document.getElementById("pw").addEventListener("keydown", (e)=>{ if(e.key==="Enter") go(); });
  </script>
</body>
</html>
